<template>
    <div class="mobile-container slds-is-relative">
        <!-- PANTALLA DE CARGA -->
        <template if:true={isLoading}>
            <lightning-spinner alternative-text="Cargando reporte..." size="medium" variant="brand"></lightning-spinner>
        </template>

        <!-- HEADER INTEGRADO -->
        <header class="mobile-header slds-grid slds-grid_align-spread slds-grid_vertical-align-center">
            <div class="slds-truncate">
                <h1 class="step-title slds-text-inverse slds-truncate" title={reportTitle}>{reportTitle}</h1>
                <p class="slds-text-body_small slds-text-inverse">{saNumber}</p>
            </div>
            <lightning-icon icon-name="standard:service_appointment" size="small" variant="inverse" class="slds-m-left_small"></lightning-icon>
        </header>

        <!-- INDICADOR DE PASOS -->
        <div class="step-indicator">
            <div class={step1Class}></div>
            <div class={step2Class}></div>
            <div class={step3Class}></div>
            <div class={step4Class}></div>
        </div>

        <!-- CONTENIDO DINÁMICO POR PASO -->
        <div class="content-area">
            
            <!-- PASO 1: EVIDENCIA ANTES -->
            <template if:true={isStepBefore}>
                <div class="step-content animate-in">
                    <div class="step-header">
                        <h2 class="step-title">Evidencia de Arribo</h2>
                        <p class="step-desc">Documente el estado inicial del área antes de comenzar.</p>
                    </div>
                    
                    <div class="camera-integration slds-m-vertical_medium">
                        <c-geo-photo-capture record-id={recordId} object-api-name="ServiceAppointment"></c-geo-photo-capture>
                    </div>

                    <div class="footer-actions">
                        <lightning-button label="SIGUIENTE: CHECKLIST" variant="brand" icon-name="utility:forward" class="full-width" onclick={handleNext}></lightning-button>
                    </div>
                </div>
            </template>

            <!-- PASO 2: CHECKLIST DINÁMICO -->
            <template if:true={isStepChecklist}>
                <div class="step-content animate-in">
                    <div class="step-header">
                        <h2 class="step-title">Inspección: {reportType}</h2>
                        <p class="step-desc">Responda basándose en los hallazgos en sitio.</p>
                    </div>
                    
                    <div class="checklist-container">
                        <template for:each={questions} for:item="q" for:index="idx">
                            <div key={q.question} class="question-card slds-m-bottom_small">
                                <p class="question-text">{q.order}. {q.question}</p>
                                
                                <div class="slds-grid slds-grid_align-spread slds-m-top_small">
                                    <lightning-button-group>
                                        <lightning-button 
                                            label="SÍ" 
                                            variant={q.yesVariant} 
                                            data-index={idx} 
                                            data-val="Si" 
                                            onclick={handleAnswer}
                                            class="btn-large">
                                        </lightning-button>
                                        <lightning-button 
                                            label="NO" 
                                            variant={q.noVariant} 
                                            data-index={idx} 
                                            data-val="No" 
                                            onclick={handleAnswer}
                                            class="btn-large">
                                        </lightning-button>
                                    </lightning-button-group>
                                </div>

                                <template if:true={q.showDeficiency}>
                                    <div class="deficiency-alert animate-in">
                                        <p class="deficiency-text">
                                            <lightning-icon icon-name="utility:warning" size="xx-small" variant="error" class="slds-m-right_xx-small"></lightning-icon>
                                            <strong>Área de Oportunidad:</strong><br/>{q.deficiency}
                                        </p>
                                    </div>
                                </template>
                            </div>
                        </template>
                    </div>

                    <div class="footer-actions">
                        <lightning-button label="ATRÁS" variant="neutral" class="full-width" onclick={handlePrev}></lightning-button>
                        <lightning-button label="SIGUIENTE: RESULTADO" variant="brand" icon-name="utility:forward" class="full-width" onclick={handleNext}></lightning-button>
                    </div>
                </div>
            </template>

            <!-- PASO 3: EVIDENCIA DESPUÉS -->
            <template if:true={isStepAfter}>
                <div class="step-content animate-in">
                    <div class="step-header">
                        <h2 class="step-title">Resultado Final</h2>
                        <p class="step-desc">Capture fotos de los trabajos concluidos.</p>
                    </div>
                    
                    <div class="camera-integration slds-m-vertical_medium">
                        <c-geo-photo-capture record-id={recordId} object-api-name="ServiceAppointment"></c-geo-photo-capture>
                    </div>

                    <div class="footer-actions">
                        <lightning-button label="ATRÁS" variant="neutral" class="full-width" onclick={handlePrev}></lightning-button>
                        <lightning-button label="SIGUIENTE: FIRMA" variant="brand" icon-name="utility:forward" class="full-width" onclick={handleNext}></lightning-button>
                    </div>
                </div>
            </template>

            <!-- PASO 4: FIRMA -->
            <template if:true={isStepSignature}>
                <div class="step-content animate-in">
                    <div class="step-header">
                        <h2 class="step-title">Validación Pyatz</h2>
                        <p class="step-desc">Firma de conformidad del cliente.</p>
                    </div>
                    
                    <div class="signature-integration slds-m-vertical_medium">
                        <c-client-signature record-id={recordId} object-api-name="ServiceAppointment"></c-client-signature>
                    </div>

                    <div class="footer-actions">
                        <lightning-button label="ATRÁS" variant="neutral" class="full-width" onclick={handlePrev}></lightning-button>
                        <lightning-button label="FINALIZAR REPORTE" variant="success" icon-name="utility:check" class="full-width" onclick={handleSaveAll} disabled={isSaving}></lightning-button>
                    </div>
                </div>
            </template>

        </div>
    </div>
</template>
