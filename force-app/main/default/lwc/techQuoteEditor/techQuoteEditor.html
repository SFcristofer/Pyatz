<template>
    <div class="main-container">
        <!-- HEADER CON PROGRESO -->
        <div class="progress-container">
            <lightning-progress-indicator current-step={currentStep} type="path" variant="base">
                <lightning-progress-step label="Contrato" value="1"></lightning-progress-step>
                <lightning-progress-step label="Datos Técnicos" value="2"></lightning-progress-step>
                <lightning-progress-step label="Detalles" value="3"></lightning-progress-step>
                <lightning-progress-step label="Finalizar" value="4"></lightning-progress-step>
            </lightning-progress-indicator>
        </div>

        <div class="slds-p-around_large content-area">
            
            <!-- PASO 1: ORIGEN Y ESTRATEGIA -->
            <template if:true={isStep1}>
                <div class="section-card slds-m-bottom_large">
                    <div class="section-header">
                        <div class="blue-square slds-m-right_small"></div>
                        <h2 class="slds-text-heading_small">Estrategia de Venta</h2>
                    </div>
                    <div class="slds-p-around_large">
                        <lightning-radio-group name="estrategiaVenta"
                            label="Categoría"
                            options={estrategiaOptions}
                            value={estrategiaVenta}
                            onchange={handleEstrategiaChange}
                            type="button"
                            variant="label-hidden"
                            class="custom-radio-group">
                        </lightning-radio-group>
                    </div>
                </div>

                <div class="section-card slds-m-bottom_large">
                    <div class="section-header">
                        <div class="blue-square slds-m-right_small"></div>
                        <h2 class="slds-text-heading_small">Origen: Necesidad</h2>
                    </div>
                    <div class="slds-p-around_large">
                        <div class="slds-grid slds-wrap slds-gutters slds-grid_vertical-align-end">
                            <div class="slds-col slds-size_1-of-1 slds-medium-size_2-of-3" style="position: relative;">
                                <lightning-input type="search" label="Buscar Necesidad relacionada" 
                                    placeholder="Escriba el nombre o folio..."
                                    onchange={handleNecesidadChange}
                                    value={necesidadSeleccionada}>
                                </lightning-input>
                                <template if:true={necesidadesResults.length}>
                                    <div class="slds-dropdown slds-dropdown_fluid slds-p-around_xx-small" style="position: absolute; display: block; z-index: 9999;">
                                        <ul class="slds-listbox slds-listbox_vertical" role="presentation">
                                            <template for:each={necesidadesResults} for:item="n">
                                                <li key={n.id} role="presentation" class="slds-listbox__item" onclick={handleNecesidadSelect} data-id={n.id}>
                                                    <div class="slds-media slds-listbox__option slds-listbox__option_plain" role="option">
                                                        <span class="slds-media__body">
                                                            <span class="slds-truncate" title={n.name}>{n.name}</span>
                                                        </span>
                                                    </div>
                                                </li>
                                            </template>
                                        </ul>
                                    </div>
                                </template>
                            </div>
                        </div>
                    </div>
                </div>
            </template>

            <!-- PASO 2: DATOS TÉCNICOS Y SEDES -->
            <template if:true={isStep2}>
                <div class="slds-grid slds-wrap slds-gutters">
                    <div class="slds-col slds-size_1-of-1">
                        <div class="section-card slds-m-bottom_large">
                            <div class="section-header">
                                <lightning-icon icon-name="utility:info" size="small" class="slds-m-right_small"></lightning-icon>
                                <h2 class="slds-text-heading_small">Información del Presupuesto</h2>
                            </div>
                            <div class="slds-p-around_large">
                                <div class="slds-grid slds-wrap slds-gutters">
                                    <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                                        <lightning-input type="text" label="Número de Presupuesto" value={folio} readonly></lightning-input>
                                    </div>
                                    <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                                        <lightning-input type="text" label="Asunto" value={asunto} onchange={handleAsuntoChange}></lightning-input>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="section-card slds-m-bottom_large">
                            <div class="section-header slds-grid slds-grid_align-spread">
                                <div class="slds-grid slds-grid_vertical-align-center">
                                    <lightning-icon icon-name="utility:announcement" size="small" class="slds-m-right_small"></lightning-icon>
                                    <h2 class="slds-text-heading_small">Introducción</h2>
                                </div>
                                <lightning-button-menu label="Cargar Plantilla" icon-name="utility:insert_tag_field" variant="border-filled" onselect={handleApplyTemplate} data-field="introduccion">
                                    <template for:each={introTemplates} for:item="tpl">
                                        <lightning-menu-item key={tpl.id} value={tpl.id} label={tpl.name}></lightning-menu-item>
                                    </template>
                                </lightning-button-menu>
                            </div>
                            <div class="slds-p-around_large">
                                <lightning-input-rich-text value={introduccion} onchange={handleIntroChange} variant="bottom-toolbar"></lightning-input-rich-text>
                            </div>
                        </div>

                        <div class="section-card slds-m-bottom_large">
                            <div class="section-header">
                                <lightning-icon icon-name="utility:tower" size="small" class="slds-m-right_small"></lightning-icon>
                                <h2 class="slds-text-heading_small">Líneas de Negocio</h2>
                            </div>
                            <div class="slds-p-around_large">
                                <div class="slds-grid slds-wrap">
                                    <template for:each={lineaNegocioOptions} for:item="option">
                                        <div key={option.value} class="slds-col slds-size_1-of-2 slds-medium-size_1-of-4 slds-p-around_xx-small">
                                            <div class="custom-checkbox-card">
                                                <lightning-input type="checkbox" label={option.label} data-value={option.value} checked={option.checked} onchange={handleLineChange}></lightning-input>
                                            </div>
                                        </div>
                                    </template>
                                </div>
                            </div>
                        </div>

                        <div class="section-card">
                            <div class="section-header slds-grid slds-grid_align-spread">
                                <div class="slds-grid slds-grid_vertical-align-center">
                                    <lightning-icon icon-name="standard:location" size="small" class="slds-m-right_small"></lightning-icon>
                                    <h2 class="slds-text-heading_small">Selección de Sedes</h2>
                                </div>
                                <div class="slds-grid slds-grid_vertical-align-center">
                                    <span class="slds-m-right_small slds-text-title_bold" style="color: #0070d2;">{sedeScopeLabel}</span>
                                    <lightning-input type="toggle" label="Búsqueda Global" variant="label-hidden" 
                                        checked={isGlobalSedeSearch} onchange={handleSedeScopeChange}
                                        message-toggle-active="Global" message-toggle-inactive="Cliente">
                                    </lightning-input>
                                </div>
                            </div>

                            <div class="slds-p-around_medium bg-blue-soft border-bottom">
                                <p class="slds-text-title_bold slds-m-bottom_x-small">Sedes Seleccionadas ({selectedSedesObjects.length}):</p>
                                <div class="pills-container slds-grid slds-wrap">
                                    <template for:each={selectedSedesObjects} for:item="s">
                                        <lightning-pill key={s.Id} label={s.Name} name={s.Id} onremove={handleRemoveSedePill} class="slds-m-around_xx-small"></lightning-pill>
                                    </template>
                                </div>
                            </div>

                            <div class="slds-p-around_medium bg-light-gray border-bottom">
                                <lightning-input type="search" placeholder={sedeSearchPlaceholder} 
                                    variant="label-hidden" value={sedeSearchTerm} onchange={handleSedeSearch}>
                                </lightning-input>
                            </div>

                            <div class="datatable-container" style="height: 400px;">
                                <lightning-datatable key-field="Id" data={sedesData} columns={sedesColumns} selected-rows={selectedSedesIds} onrowselection={handleSedeSelection} max-row-selection={maxRowSelection}></lightning-datatable>
                            </div>
                        </div>
                    </div>
                </div>
            </template>

            <!-- PASO 3: DETALLES -->
            <template if:true={isStep3}>
                <div class="section-card slds-m-bottom_large">
                    <div class="section-header"><h2 class="slds-text-heading_small">Partidas del Presupuesto</h2></div>
                    <div class="slds-p-around_none datatable-container">
                        <table class="slds-table slds-table_bordered slds-no-row-hover">
                            <thead>
                                <tr>
                                    <th style="width: 40px;"></th>
                                    <th>Servicio / Descripción</th>
                                    <th>Sede(s)</th>
                                    <th style="width: 80px; text-align: center;">Cant.</th>
                                    <th style="width: 120px; text-align: right;">Total</th>
                                    <th style="width: 100px; text-align: center;">Acciones</th>
                                </tr>
                            </thead>
                            <tbody ondragover={handleDragOver} ondrop={handleDrop}>
                                <template for:each={serviciosData} for:item="item" for:index="index">
                                    <tr key={item.id} class={item.rowClass} draggable="true" ondragstart={handleDragStart} data-index={index}>
                                        <td class="drag-handle"><lightning-icon icon-name="utility:rows" size="xx-small"></lightning-icon></td>
                                        <td>
                                            <div class="slds-text-title_bold">{item.descripcion}</div>
                                            <template if:true={item.areas}>
                                                <div class="slds-text-color_weak slds-text-body_small">
                                                    <lightning-icon icon-name="utility:checkin" size="xx-small" class="slds-m-right_xx-small"></lightning-icon>
                                                    Áreas: {item.areas}
                                                </div>
                                            </template>
                                        </td>
                                        <td><div class="slds-truncate" title={item.sedes}>{item.sedes}</div></td>
                                        <td style="text-align: center;">{item.cantidad}</td>
                                        <td style="text-align: right;"><strong><lightning-formatted-number value={item.totalSinImpuestos} format-style="currency"></lightning-formatted-number></strong></td>
                                        <td class="slds-text-align_center">
                                            <lightning-button-icon icon-name="utility:delete" variant="bare-error" onclick={handleRowAction} data-id={item.id} data-action="delete"></lightning-button-icon>
                                        </td>
                                    </tr>
                                </template>
                            </tbody>
                        </table>
                        <div class="slds-p-around_medium slds-grid slds-grid_align-spread bg-white border-top">
                            <div class="slds-grid">
                                <lightning-button label="+ Añadir servicios" variant="brand" class="slds-m-right_small" onclick={handleOpenModal}></lightning-button>
                                <lightning-button label="+ Añadir Separador" variant="brand-outline" onclick={handleOpenSeparatorModal}></lightning-button>
                            </div>
                            <lightning-button label="P&L" icon-name="utility:calculator" onclick={handleOpenPLModal}></lightning-button>
                        </div>
                    </div>
                </div>

                <div class="section-card slds-m-bottom_large">
                    <div class="section-header"><h2>Resumen de Totales</h2></div>
                    <div class="datatable-container">
                        <lightning-datatable key-field="id" data={totalesData} columns={totalesColumns} hide-checkbox-column></lightning-datatable>
                    </div>
                    <div class="slds-p-around_large bg-white border-top">
                        <div class="slds-grid slds-wrap slds-gutters">
                            <div class="slds-col slds-size_1-of-3"><lightning-input type="checkbox" label="Mostrar total" checked={showTotal} onchange={handleShowTotalChange}></lightning-input></div>
                            <div class="slds-col slds-size_1-of-3"><lightning-input type="checkbox" label="Mostrar impuestos" checked={showTaxes} onchange={handleShowTaxesChange}></lightning-input></div>
                            <div class="slds-col slds-size_1-of-3"><lightning-input type="checkbox" label="Añadir explicación" checked={showDescription} onchange={handleShowDescriptionChange}></lightning-input></div>
                        </div>
                    </div>
                </div>

                <template if:true={showDescription}>
                    <div class="section-card slds-m-bottom_large">
                        <div class="section-header slds-grid slds-grid_align-spread">
                            <h2 class="slds-text-heading_small">Condiciones / Anexos</h2>
                            <lightning-button-menu label="Usar Plantilla" onselect={handleApplyTemplate} data-field="warranty">
                                <template for:each={warrantyTemplates} for:item="tpl"><lightning-menu-item key={tpl.id} value={tpl.id} label={tpl.name}></lightning-menu-item></template>
                            </lightning-button-menu>
                        </div>
                        <div class="slds-p-around_large"><lightning-input-rich-text value={warranty} onchange={handleWarrantyChange} variant="bottom-toolbar"></lightning-input-rich-text></div>
                    </div>
                </template>

                <div class="section-card slds-m-bottom_large">
                    <div class="section-header">
                        <lightning-icon icon-name="utility:moneybag" size="small" variant="inverse" class="slds-m-right_small"></lightning-icon>
                        <h2>Método de Pago</h2>
                    </div>
                    <div class="slds-p-around_large">
                        <div class="slds-grid slds-wrap slds-gutters">
                            <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                                <p class="slds-text-title_bold">Opciones de Pago</p>
                                <lightning-input type="checkbox" label="Transferencia" checked={pagoTransferencia} onchange={handlePagoTransferenciaChange}></lightning-input>
                                <lightning-input type="checkbox" label="Tarjeta" checked={pagoTarjeta} onchange={handlePagoTarjetaChange}></lightning-input>

                                <p class="slds-text-title_bold slds-m-top_medium">TIPO DE TRABAJO:</p>
                                <lightning-input type="checkbox" label="Trabajo único/puntual" checked={trabajoPuntual} onchange={handleTrabajoPuntualChange}></lightning-input>
                                <lightning-input type="checkbox" label="Venta producto" checked={ventaProducto} onchange={handleVentaProductoChange}></lightning-input>
                                <lightning-input type="checkbox" label="Contrato de mantenimiento" checked={trabajoMantenimiento} onchange={handleTrabajoMantenimientoChange}></lightning-input>
                            </div>
                            <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                                <div class="slds-grid slds-grid_align-spread slds-m-bottom_small">
                                    <p class="slds-text-title_bold">Observaciones sobre pago:</p>
                                    <lightning-button-menu label="Plantilla Pago" variant="bare" onselect={handleApplyTemplate} data-field="observacionesPago">
                                        <template for:each={pagoTemplates} for:item="tpl">
                                            <lightning-menu-item key={tpl.id} value={tpl.id} label={tpl.name}></lightning-menu-item>
                                        </template>
                                    </lightning-button-menu>
                                </div>
                                <lightning-input-rich-text value={observacionesPago} onchange={handleObservacionesPagoChange} variant="bottom-toolbar"></lightning-input-rich-text>
                            </div>
                        </div>
                    </div>
                </div>
                </template>

            <!-- PASO 4: FINALIZAR Y REVISIÓN DE PRECISIÓN -->
            <template if:true={isStep4}>
                <div class="section-card no-border bg-dark-workspace">
                    <div class="slds-p-around_medium slds-grid slds-grid_align-spread bg-slate-header">
                        <div class="slds-grid slds-grid_vertical-align-center">
                            <lightning-icon icon-name="doctype:pdf" size="small" variant="inverse" class="slds-m-right_small"></lightning-icon>
                            <h2 class="slds-text-heading_small text-white">Revisión Final del Documento (Vista de Impresión)</h2>
                        </div>
                        <div class="slds-text-color_inverse-low slds-text-body_small">
                            ID: {recordId} | Folio: {folio}
                        </div>
                    </div>
                    
                    <!-- WORKSPACE DE PDF ESTILO HERRAMIENTA PROFESIONAL -->
                    <div class="pdf-workspace-container">
                        <template if:true={pdfUrl}>
                            <iframe src={pdfUrl} width="100%" height="100%" class="pdf-workspace-frame"></iframe>
                        </template>
                        <template if:false={pdfUrl}>
                            <div class="slds-align_absolute-center slds-p-around_xx-large">
                                <lightning-spinner alternative-text="Generando previsualización..." size="medium" variant="brand"></lightning-spinner>
                            </div>
                        </template>
                    </div>

                    <div class="slds-p-around_medium slds-text-align_center bg-white border-top">
                        <p class="slds-text-color_weak slds-m-bottom_small">Revise que toda la información técnica y los montos sean correctos antes de finalizar.</p>
                        <div class="slds-grid slds-grid_align-center">
                            <lightning-button label="Confirmar, Guardar y Finalizar Presupuesto" variant="brand" icon-name="utility:save" size="large" onclick={handleFinalize} class="slds-m-right_medium"></lightning-button>
                            <lightning-button label="Generar Contrato Legal" variant="success" icon-name="standard:contract" size="large" onclick={handleGoToContract} if:true={recordId}></lightning-button>
                        </div>
                    </div>
                </div>
            </template>
        </div>

        <!-- FOOTER STICKY -->
        <div class="sticky-footer slds-p-around_medium bg-white border-top">
            <div class="slds-grid slds-grid_align-spread">
                <lightning-button label="Regresar al Inicio" icon-name="utility:back" onclick={handleCancel}></lightning-button>
                <div class="slds-grid">
                    <template if:false={isStep1}><lightning-button label="Anterior" onclick={handleBack} class="slds-m-right_small"></lightning-button></template>
                    <template if:false={isStep4}><lightning-button label="Siguiente" variant="brand" onclick={handleNext}></lightning-button></template>
                </div>
            </div>
        </div>

        <!-- MODAL DE PREVISUALIZACIÓN DE PRECISIÓN -->
        <template if:true={showPdfModal}>
            <section role="dialog" tabindex="-1" class="slds-modal slds-fade-in-open slds-modal_large">
                <div class="slds-modal__container">
                    <header class="slds-modal__header">
                        <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse" title="Cerrar" onclick={handleClosePdfModal}>
                            <lightning-icon icon-name="utility:close" variant="inverse" size="small"></lightning-icon>
                        </button>
                        <h2 class="slds-text-heading_medium">Previsualización de Precisión (PDF Real)</h2>
                    </header>
                    <div class="slds-modal__content slds-p-around_medium pdf-viewer-container" style="height: 75vh; background: #525659;">
                        <iframe src={pdfUrl} width="100%" height="100%" style="border: none; border-radius: 4px;"></iframe>
                    </div>
                    <footer class="slds-modal__footer">
                        <lightning-button label="Cerrar Vista Previa" variant="neutral" onclick={handleClosePdfModal}></lightning-button>
                    </footer>
                </div>
            </section>
            <div class="slds-backdrop slds-backdrop_open"></div>
        </template>

        <!-- MODAL SEPARADOR -->
        <template if:true={showSeparatorModal}>
            <section class="slds-modal slds-fade-in-open slds-modal_x-small">
                <div class="slds-modal__container">
                    <header class="slds-modal__header"><h2>Añadir Separador</h2></header>
                    <div class="slds-modal__content slds-p-around_medium">
                        <lightning-input label="Texto del Separador" value={separatorText} onchange={handleSeparatorTextChange}></lightning-input>
                    </div>
                    <footer class="slds-modal__footer">
                        <lightning-button label="Cancelar" onclick={handleCloseSeparatorModal} class="slds-m-right_x-small"></lightning-button>
                        <lightning-button label="Añadir" variant="brand" onclick={handleAddSeparator}></lightning-button>
                    </footer>
                </div>
            </section>
            <div class="slds-backdrop slds-backdrop_open"></div>
        </template>

        <!-- MODAL SERVICIO PRO (ESTRUCTURA V1 + DISEÑO MODERNO) -->
        <template if:true={showModal}>
            <section role="dialog" class="slds-modal slds-fade-in-open slds-modal_large">
                <div class="slds-modal__container">
                    <header class="slds-modal__header"><h2>Configurador de Partida</h2></header>
                    <div class="slds-modal__content slds-p-around_large">
                        
                        <div class="section-card slds-p-around_medium slds-m-bottom_medium overflow-visible" style="position: relative;">
                            <p class="slds-text-title_bold slds-m-bottom_small">1. Localizar artículo en el catálogo</p>
                            <lightning-input type="search" variant="label-hidden" placeholder="Busque por nombre o SKU..." onchange={handleProductSearch} value={selectedProductName}></lightning-input>
                            
                            <template if:true={searchResults.length}>
                                <div class="product-search-results">
                                    <template for:each={searchResults} for:item="res">
                                        <div key={res.id} class="product-result-item" onclick={handleProductSelect} data-id={res.id}>
                                            <span class="product-name-only"><strong>{res.name}</strong></span>
                                        </div>
                                    </template>
                                </div>
                            </template>

                            <template if:true={productPriceOptions.length}>
                                <div class="slds-m-top_large">
                                    <p class="slds-text-title_bold slds-m-bottom_small">Listas de Precios Disponibles:</p>
                                    <div class="slds-grid slds-wrap">
                                        <template for:each={productPriceOptions} for:item="opt">
                                            <div key={opt.pbeId} class="slds-col slds-size_1-of-3 slds-p-around_xx-small">
                                                <div class={opt.className} onclick={handlePriceOptionSelect} data-id={opt.pbeId}>
                                                    <span class="slds-text-title_bold">{opt.pricebookName}</span>
                                                    <strong><lightning-formatted-number value={opt.unitPrice} format-style="currency"></lightning-formatted-number></strong>
                                                </div>
                                            </div>
                                        </template>
                                    </div>
                                </div>
                            </template>
                        </div>

                        <div class="slds-grid slds-wrap slds-gutters">
                            <!-- Columna Tabla -->
                            <div class="slds-col slds-size_1-of-1 slds-large-size_2-of-3">
                                <div class="section-card slds-p-around_medium">
                                    <div class="slds-grid slds-grid_align-spread slds-m-bottom_small">
                                        <span class="slds-text-title_bold">Desglose por Sede</span>
                                        <lightning-button-group>
                                            <lightning-button label="Unitario" variant={isUnitarioVariant} onclick={handlePriceType} value="UNITARIO"></lightning-button>
                                            <lightning-button label="Total" variant={isTotalVariant} onclick={handlePriceType} value="TOTAL"></lightning-button>
                                        </lightning-button-group>
                                    </div>
                                    <table class="slds-table slds-table_bordered">
                                        <thead>
                                            <tr>
                                                <th style="width: 3rem;"></th>
                                                <th>Sede</th>
                                                <th style="width: 80px;">Cant.</th>
                                                <th style="width: 140px;">Importe</th>
                                                <template if:true={showDiscountColumn}><th style="width: 100px;">Desc. ($)</th></template>
                                                <th style="width: 140px; text-align: right;">Total</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            <template for:each={modalTableData} for:item="row">
                                                <tr key={row.id}>
                                                    <td><lightning-input type="checkbox" checked={row.isSelected} data-id={row.id} onchange={handleSedeRowToggle} variant="label-hidden"></lightning-input></td>
                                                    <td class="slds-text-title_bold">{row.sede}</td>
                                                    <td><lightning-input type="number" value={row.cantidad} data-id={row.id} data-field="cantidad" onchange={handleModalInputChange} variant="label-hidden" disabled={row.isDisabled}></lightning-input></td>
                                                    <td><lightning-input type="number" step="0.01" value={row.importeTotal} data-id={row.id} data-field="importeTotal" onchange={handleModalInputChange} variant="label-hidden" disabled={row.isDisabled}></lightning-input></td>
                                                    <template if:true={showDiscountColumn}><td><lightning-input type="number" value={row.descuento} data-id={row.id} data-field="descuento" onchange={handleModalInputChange} variant="label-hidden" disabled={row.isDisabled}></lightning-input></td></template>
                                                    <td style="text-align: right;"><strong><lightning-formatted-number value={row.totalSinImpuestos} format-style="currency"></lightning-formatted-number></strong></td>
                                                </tr>
                                            </template>
                                        </tbody>
                                    </table>
                                    <div class="slds-m-top_small"><lightning-button label="Habilitar Descuento" icon-name="utility:discount" variant="base" onclick={handleToggleDiscountColumn}></lightning-button></div>
                                </div>
                            </div>
                            <!-- Columna Operativa (Solo Zonas) -->
                            <div class="slds-col slds-size_1-of-1 slds-large-size_1-of-3">
                                <div class="section-card slds-p-around_medium">
                                    <div class="slds-m-bottom_medium">
                                        <p class="slds-text-title_bold slds-m-bottom_small">Zonas / Indicaciones</p>
                                        <div class="slds-p-around_small border-all radius-8 bg-light-gray">
                                            <div class="slds-grid slds-wrap slds-m-bottom_x-small">
                                                <template for:each={zonasAfectadas} for:item="z">
                                                    <lightning-pill key={z} label={z} name={z} onremove={removeZona} class="slds-m-around_xx-small"></lightning-pill>
                                                </template>
                                            </div>
                                            <lightning-input type="text" value={zonaInput} onchange={handleZonaInput} placeholder="Zona y coma..."></lightning-input>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- NUEVA SECCIÓN: DESCRIPCIÓN TÉCNICA ABAJO -->
                        <div class="section-card slds-p-around_medium">
                            <div class="slds-grid slds-grid_align-spread slds-m-bottom_small">
                                <p class="slds-text-title_bold">Descripción Técnica (PDF)</p>
                                <lightning-button-menu label="Plantilla Técnica" variant="bare" onselect={handleApplyTemplate} data-field="modalDescription">
                                    <template for:each={serviceTemplates} for:item="tpl"><lightning-menu-item key={tpl.id} value={tpl.id} label={tpl.name}></lightning-menu-item></template>
                                </lightning-button-menu>
                            </div>
                            <lightning-input-rich-text value={modalDescription} onchange={handleModalDescriptionChange} variant="bottom-toolbar"></lightning-input-rich-text>
                        </div>
                    </div>
                    <footer class="slds-modal__footer">
                        <lightning-button label="Cancelar" onclick={handleCloseModal} class="slds-m-right_small"></lightning-button>
                        <lightning-button label="Añadir al Presupuesto" variant="brand" onclick={handleSaveServiceLine}></lightning-button>
                    </footer>
                </div>
            </section>
            <div class="slds-backdrop slds-backdrop_open"></div>
        </template>

        <!-- MODAL P&L -->
        <template if:true={showPLModal}>
            <section role="dialog" tabindex="-1" class="slds-modal slds-fade-in-open slds-modal_medium">
                <div class="slds-modal__container">
                    <header class="slds-modal__header"><h2>Análisis de Rentabilidad (P&L)</h2></header>
                    <div class="slds-modal__content slds-p-around_medium">
                        <div class="slds-grid slds-wrap slds-gutters">
                            <div class="slds-col slds-size_1-of-3"><div class="slds-box slds-theme_shade"><p class="slds-text-title_bold">Margen Bruto</p><h3 class="slds-text-heading_large">25%</h3></div></div>
                            <div class="slds-col slds-size_1-of-3"><div class="slds-box slds-theme_shade"><p class="slds-text-title_bold">Costo Total</p><h3 class="slds-text-heading_large">$0.00</h3></div></div>
                            <div class="slds-col slds-size_1-of-3"><div class="slds-box slds-theme_shade"><p class="slds-text-title_bold">Utilidad</p><h3 class="slds-text-heading_large">$0.00</h3></div></div>
                        </div>
                    </div>
                    <footer class="slds-modal__footer"><lightning-button label="Cerrar" onclick={handleClosePLModal}></lightning-button></footer>
                </div>
            </section>
            <div class="slds-backdrop slds-backdrop_open"></div>
        </template>
    </div>
</template>
