<template>
    <div class="main-container">
        <!-- HEADER CON PROGRESO -->
        <div class="progress-container">
            <lightning-progress-indicator current-step={currentStep} type="path" variant="base">
                <lightning-progress-step label="Contrato" value="1"></lightning-progress-step>
                <lightning-progress-step label="Datos Técnicos" value="2"></lightning-progress-step>
                <lightning-progress-step label="Detalles" value="3"></lightning-progress-step>
                <lightning-progress-step label="Finalizar" value="4"></lightning-progress-step>
            </lightning-progress-indicator>
        </div>

        <div class="slds-p-around_large content-area">
            
            <!-- PASO 1: ORIGEN Y ESTRATEGIA -->
            <template if:true={isStep1}>
                <div class="section-card slds-m-bottom_large">
                    <div class="section-header">
                        <div class="blue-square slds-m-right_small"></div>
                        <h2 class="slds-text-heading_small">Estrategia de Venta</h2>
                    </div>
                    <div class="slds-p-around_large">
                        <lightning-radio-group name="estrategiaVenta"
                            label="Categoría"
                            options={estrategiaOptions}
                            value={estrategiaVenta}
                            onchange={handleEstrategiaChange}
                            type="button"
                            variant="label-hidden"
                            class="custom-radio-group">
                        </lightning-radio-group>
                    </div>
                </div>
            </template>

            <!-- PASO 2: DATOS TÉCNICOS Y SEDES -->
            <template if:true={isStep2}>
                <div class="slds-grid slds-wrap slds-gutters">
                    <div class="slds-col slds-size_1-of-1">
                        <div class="section-card slds-m-bottom_large">
                            <div class="section-header">
                                <lightning-icon icon-name="utility:info" size="small" class="slds-m-right_small"></lightning-icon>
                                <h2 class="slds-text-heading_small">Información del Presupuesto</h2>
                            </div>
                            <div class="slds-p-around_large">
                                <div class="slds-grid slds-wrap slds-gutters">
                                    <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                                        <lightning-input type="text" label="Número de Presupuesto" value={folio} readonly></lightning-input>
                                    </div>
                                    <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                                        <lightning-input type="text" label="Asunto" value={asunto} onchange={handleAsuntoChange}></lightning-input>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="section-card slds-m-bottom_large">
                            <div class="section-header slds-grid slds-grid_align-spread">
                                <div class="slds-grid slds-grid_vertical-align-center">
                                    <lightning-icon icon-name="utility:announcement" size="small" class="slds-m-right_small"></lightning-icon>
                                    <h2 class="slds-text-heading_small">Introducción Técnica</h2>
                                </div>
                                <lightning-button-menu label="Cargar Plantilla" icon-name="utility:insert_tag_field" variant="border-filled" onselect={handleApplyTemplate} data-field="introduccion">
                                    <template for:each={introTemplates} for:item="tpl">
                                        <lightning-menu-item key={tpl.id} value={tpl.id} label={tpl.name}></lightning-menu-item>
                                    </template>
                                </lightning-button-menu>
                            </div>
                            <div class="slds-p-around_large">
                                <div class="slds-grid slds-gutters slds-m-bottom_small">
                                    <div class="slds-col slds-size_1-of-1">
                                        <p class="slds-text-title_bold slds-m-bottom_x-small">Dirigido a (Atención):</p>
                                        <lightning-checkbox-group
                                            name="contactSelector"
                                            label="Contactos disponibles"
                                            variant="label-hidden"
                                            options={contactOptions}
                                            value={selectedContactIds}
                                            onchange={handleContactChange}>
                                        </lightning-checkbox-group>
                                    </div>
                                </div>
                                <div class="slds-m-top_medium">
                                    <p class="slds-text-title_bold slds-m-bottom_x-small">Cuerpo de la Introducción:</p>
                                    <lightning-input-rich-text value={introduccion} onchange={handleIntroChange} variant="bottom-toolbar"></lightning-input-rich-text>
                                </div>
                            </div>
                        </div>

                        <div class="section-card slds-m-bottom_large">
                            <div class="section-header">
                                <lightning-icon icon-name="utility:tower" size="small" class="slds-m-right_small"></lightning-icon>
                                <h2 class="slds-text-heading_small">Líneas de Negocio</h2>
                            </div>
                            <div class="slds-p-around_large">
                                <div class="slds-grid slds-wrap">
                                    <template for:each={lineaNegocioOptions} for:item="option">
                                        <div key={option.value} class="slds-col slds-size_1-of-2 slds-medium-size_1-of-4 slds-p-around_xx-small">
                                            <div class="custom-checkbox-card">
                                                <lightning-input type="checkbox" label={option.label} data-value={option.value} checked={option.checked} onchange={handleLineChange}></lightning-input>
                                            </div>
                                        </div>
                                    </template>
                                </div>
                            </div>
                        </div>

                        <div class="section-card">                            <div class="section-header slds-grid slds-grid_align-spread">
                                <div class="slds-grid slds-grid_vertical-align-center">
                                    <lightning-icon icon-name="standard:location" size="small" class="slds-m-right_small"></lightning-icon>
                                    <h2 class="slds-text-heading_small">Selección de Sedes</h2>
                                </div>
                                <div class="slds-grid slds-grid_vertical-align-center">
                                    <span class="slds-m-right_small slds-text-title_bold" style="color: #0070d2;">{sedeScopeLabel}</span>
                                    <lightning-input type="toggle" label="Búsqueda Global" variant="label-hidden" 
                                        checked={isGlobalSedeSearch} onchange={handleSedeScopeChange}
                                        message-toggle-active="Global" message-toggle-inactive="Cliente">
                                    </lightning-input>
                                </div>
                            </div>

                            <div class="slds-p-around_medium bg-blue-soft border-bottom">
                                <p class="slds-text-title_bold slds-m-bottom_x-small">Sedes Seleccionadas ({selectedSedesObjects.length}):</p>
                                <div class="pills-container slds-grid slds-wrap">
                                    <template for:each={selectedSedesObjects} for:item="s">
                                        <lightning-pill key={s.Id} label={s.Name} name={s.Id} onremove={handleRemoveSedePill} class="slds-m-around_xx-small"></lightning-pill>
                                    </template>
                                </div>
                            </div>

                            <div class="slds-p-around_medium bg-light-gray border-bottom">
                                <lightning-input type="search" placeholder={sedeSearchPlaceholder} 
                                    variant="label-hidden" value={sedeSearchTerm} onchange={handleSedeSearch}>
                                </lightning-input>
                            </div>

                            <div class="datatable-container" style="height: 400px;">
                                <lightning-datatable key-field="Id" data={sedesData} columns={sedesColumns} selected-rows={selectedSedesIds} onrowselection={handleSedeSelection} max-row-selection={maxRowSelection}></lightning-datatable>
                            </div>
                        </div>
                    </div>
                </div>
            </template>

            <!-- PASO 3: DETALLES -->
            <template if:true={isStep3}>
                <div class="section-card slds-m-bottom_large">
                    <div class="section-header"><h2 class="slds-text-heading_small">Partidas del Presupuesto</h2></div>
                    <div class="slds-p-around_none datatable-container">
                        <table class="slds-table slds-table_bordered slds-no-row-hover">
                            <thead>
                                <tr>
                                    <th style="width: 40px;"></th>
                                    <th>Servicio / Descripción</th>
                                    <th>Sede(s)</th>
                                    <th style="width: 80px; text-align: center;">Cant.</th>
                                    <th style="width: 120px; text-align: right;">Total</th>
                                    <th style="width: 100px; text-align: center;">Acciones</th>
                                </tr>
                            </thead>
                            <tbody>
                                <template for:each={serviciosData} for:item="item" for:index="index">
                                    <tr key={item.id} class={item.rowClass}>
                                        <td class="drag-handle"><lightning-icon icon-name="utility:rows" size="xx-small"></lightning-icon></td>
                                        <td>
                                            <div class="slds-text-title_bold">{item.descripcion}</div>
                                            <template if:true={item.areas}>
                                                <div class="slds-text-color_weak slds-text-body_small">
                                                    <lightning-icon icon-name="utility:checkin" size="xx-small" class="slds-m-right_xx-small"></lightning-icon>
                                                    Áreas: {item.areas}
                                                </div>
                                            </template>
                                        </td>
                                        <td><div class="slds-truncate" title={item.sedes}>{item.sedes}</div></td>
                                        <td style="text-align: center;">{item.cantidad}</td>
                                        <td style="text-align: right;"><strong><lightning-formatted-number value={item.totalSinImpuestos} format-style="currency"></lightning-formatted-number></strong></td>
                                        <td class="slds-text-align_center">
                                            <lightning-button-icon icon-name="utility:delete" variant="bare-error" onclick={handleRowAction} data-id={item.id} data-action="delete"></lightning-button-icon>
                                        </td>
                                    </tr>
                                </template>
                            </tbody>
                        </table>
                        <div class="slds-p-around_medium slds-grid slds-grid_align-spread bg-white border-top">
                            <div class="slds-grid">
                                <lightning-button label="+ Añadir servicios" variant="brand" class="slds-m-right_small" onclick={handleOpenModal}></lightning-button>
                                <lightning-button label="+ Añadir Separador" variant="brand-outline" onclick={handleOpenSeparatorModal}></lightning-button>
                            </div>
                            <!-- MEJORA: Botón P&L ahora más visible y profesional -->
                            <lightning-button label="Análisis Estratégico P&L" icon-name="utility:calculator" variant="brand-outline" onclick={handleOpenPLModal}></lightning-button>
                        </div>
                    </div>
                </div>

                <div class="section-card slds-m-bottom_large">
                    <div class="section-header"><h2>Resumen de Totales</h2></div>
                    <div class="datatable-container">
                        <lightning-datatable key-field="id" data={totalesData} columns={totalesColumns} hide-checkbox-column></lightning-datatable>
                    </div>
                </div>

                <template if:true={showDescription}>
                    <div class="section-card slds-m-bottom_large">
                        <div class="section-header slds-grid slds-grid_align-spread">
                            <h2 class="slds-text-heading_small">Condiciones / Anexos</h2>
                            <lightning-button-menu label="Usar Plantilla" onselect={handleApplyTemplate} data-field="warranty">
                                <template for:each={warrantyTemplates} for:item="tpl"><lightning-menu-item key={tpl.id} value={tpl.id} label={tpl.name}></lightning-menu-item></template>
                            </lightning-button-menu>
                        </div>
                        <div class="slds-p-around_large"><lightning-input-rich-text value={warranty} onchange={handleWarrantyChange} variant="bottom-toolbar"></lightning-input-rich-text></div>
                    </div>
                </template>

                <div class="section-card slds-m-bottom_large">
                    <div class="section-header">
                        <lightning-icon icon-name="utility:moneybag" size="small" variant="inverse" class="slds-m-right_small"></lightning-icon>
                        <h2>Método de Pago</h2>
                    </div>
                    <div class="slds-p-around_large">
                        <div class="slds-grid slds-wrap slds-gutters">
                            <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                                <p class="slds-text-title_bold">Opciones de Pago</p>
                                <lightning-input type="checkbox" label="Transferencia" checked={pagoTransferencia} onchange={handlePagoTransferenciaChange}></lightning-input>
                                <lightning-input type="checkbox" label="Tarjeta" checked={pagoTarjeta} onchange={handlePagoTarjetaChange}></lightning-input>

                                <p class="slds-text-title_bold slds-m-top_medium">TIPO DE TRABAJO:</p>
                                <lightning-input type="checkbox" label="Trabajo único/puntual" checked={trabajoPuntual} onchange={handleTrabajoPuntualChange}></lightning-input>
                                <lightning-input type="checkbox" label="Venta producto" checked={ventaProducto} onchange={handleVentaProductoChange}></lightning-input>
                                <lightning-input type="checkbox" label="Contrato de mantenimiento" checked={trabajoMantenimiento} onchange={handleTrabajoMantenimientoChange}></lightning-input>
                            </div>
                            <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                                <div class="slds-grid slds-grid_align-spread slds-m-bottom_small">
                                    <p class="slds-text-title_bold">Observaciones sobre pago:</p>
                                    <lightning-button-menu label="Plantilla Pago" variant="bare" onselect={handleApplyTemplate} data-field="observacionesPago">
                                        <template for:each={pagoTemplates} for:item="tpl">
                                            <lightning-menu-item key={tpl.id} value={tpl.id} label={tpl.name}></lightning-menu-item>
                                        </template>
                                    </lightning-button-menu>
                                </div>
                                <lightning-input-rich-text value={observacionesPago} onchange={handleObservacionesPagoChange} variant="bottom-toolbar"></lightning-input-rich-text>
                            </div>
                        </div>
                    </div>
                </div>
                </template>

            <!-- PASO 4: FINALIZAR -->
            <template if:true={isStep4}>
                <div class="section-card no-border bg-dark-workspace">
                    <div class="slds-p-around_medium slds-grid slds-grid_align-spread bg-slate-header">
                        <div class="slds-grid slds-grid_vertical-align-center">
                            <lightning-icon icon-name="doctype:pdf" size="small" variant="inverse" class="slds-m-right_small"></lightning-icon>
                            <h2 class="slds-text-heading_small text-white">Revisión Final del Documento</h2>
                        </div>
                    </div>
                    <div class="pdf-workspace-container">
                        <template if:true={pdfUrl}>
                            <iframe src={pdfUrl} width="100%" height="100%" class="pdf-workspace-frame"></iframe>
                        </template>
                    </div>
                    <div class="slds-p-around_medium slds-text-align_center bg-white border-top">
                        <lightning-button label="Confirmar y Finalizar Presupuesto" variant="brand" icon-name="utility:save" size="large" onclick={handleFinalize}></lightning-button>
                    </div>
                </div>
            </template>
        </div>

        <!-- FOOTER STICKY -->
        <div class="sticky-footer slds-p-around_medium bg-white border-top">
            <div class="slds-grid slds-grid_align-spread">
                <lightning-button label="Regresar al Inicio" icon-name="utility:back" onclick={handleCancel}></lightning-button>
                <div class="slds-grid">
                    <template if:false={isStep1}><lightning-button label="Anterior" onclick={handleBack} class="slds-m-right_small"></lightning-button></template>
                    <template if:false={isStep4}><lightning-button label="Siguiente" variant="brand" onclick={handleNext}></lightning-button></template>
                </div>
            </div>
        </div>

        <!-- MODAL SERVICIO PRO -->
        <template if:true={showModal}>
            <section role="dialog" class="slds-modal slds-fade-in-open slds-modal_large">
                <div class="slds-modal__container">
                    <header class="slds-modal__header"><h2>Configurador de Partida</h2></header>
                    <div class="slds-modal__content slds-p-around_large">
                        <div class="section-card slds-p-around_medium slds-m-bottom_medium overflow-visible">
                            <lightning-input type="search" placeholder="Busque por nombre o SKU..." onchange={handleProductSearch} value={selectedProductName}></lightning-input>
                            <template if:true={searchResults.length}>
                                <div class="product-search-results">
                                    <template for:each={searchResults} for:item="res">
                                        <div key={res.id} class="product-result-item" onclick={handleProductSelect} data-id={res.id}>
                                            <strong>{res.name}</strong>
                                        </div>
                                    </template>
                                </div>
                            </template>
                        </div>
                        <div class="section-card slds-p-around_medium">
                            <table class="slds-table slds-table_bordered">
                                <thead>
                                    <tr>
                                        <th>Sede</th>
                                        <th>Cant.</th>
                                        <th>Importe</th>
                                        <th style="text-align: right;">Total</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <template for:each={modalTableData} for:item="row">
                                        <tr key={row.id}>
                                            <td class="slds-text-title_bold">{row.sede}</td>
                                            <td><lightning-input type="number" value={row.cantidad} data-id={row.id} data-field="cantidad" onchange={handleModalInputChange} variant="label-hidden"></lightning-input></td>
                                            <td><lightning-input type="number" step="0.01" value={row.importeTotal} data-id={row.id} data-field="importeTotal" onchange={handleModalInputChange} variant="label-hidden"></lightning-input></td>
                                            <td style="text-align: right;"><strong><lightning-formatted-number value={row.totalSinImpuestos} format-style="currency"></lightning-formatted-number></strong></td>
                                        </tr>
                                    </template>
                                </tbody>
                            </table>
                        </div>
                    </div>
                    <footer class="slds-modal__footer">
                        <lightning-button label="Cancelar" onclick={handleCloseModal} class="slds-m-right_small"></lightning-button>
                        <lightning-button label="Añadir al Presupuesto" variant="brand" onclick={handleSaveServiceLine}></lightning-button>
                    </footer>
                </div>
            </section>
            <div class="slds-backdrop slds-backdrop_open"></div>
        </template>

        <!-- MODAL P&L PREMIUM (REDISEÑADO) -->
        <template if:true={showPLModal}>
            <section role="dialog" tabindex="-1" class="slds-modal slds-fade-in-open slds-modal_medium">
                <div class="slds-modal__container" style="max-width: 95%; width: 1150px;">
                    <header class="slds-modal__header" style="background: linear-gradient(90deg, #001a33 0%, #004d99 100%); color: white; border-bottom: 4px solid #ffcc00; border-radius: 8px 8px 0 0;">
                        <div class="slds-grid slds-grid_vertical-align-center">
                            <lightning-icon icon-name="utility:calculator" variant="inverse" size="medium" class="slds-m-right_small"></lightning-icon>
                            <div class="slds-text-align_left">
                                <h2 class="slds-text-heading_medium slds-font-weight_bold">Dashboard Estratégico de Rentabilidad</h2>
                                <p style="font-size: 0.85rem; opacity: 0.9;">Optimización de Costos y Simulación de Margen Real</p>
                            </div>
                        </div>
                    </header>
                    <div class="slds-modal__content" style="background: #fdfdfd; border-radius: 0 0 8px 8px;">
                        <div class="slds-p-around_medium">
                            <table class="pl-table-professional slds-table slds-table_bordered slds-table_fixed-layout" style="border: 1px solid #e2e8f0; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);">
                                <thead>
                                    <tr style="background: #f8fafc;">
                                        <th style="width: 28%; padding: 15px; color: #475569; font-weight: 800; border-bottom: 2px solid #e2e8f0;">INDICADOR ESTRATÉGICO</th>
                                        <th style="width: 18%; text-align: center; background: #f0f9ff; color: #0369a1; border-left: 2px solid #bae6fd; border-bottom: 2px solid #bae6fd; font-weight: 800;">% / TASA GLOBAL</th>
                                        <th style="width: 27%; text-align: right; padding-right: 30px; font-weight: 800; border-bottom: 2px solid #e2e8f0;">ESCENARIO AÑO 1 ($)</th>
                                        <th style="width: 27%; text-align: right; padding-right: 30px; font-weight: 800; border-bottom: 2px solid #e2e8f0;">ESCENARIO AÑO 2 ($)</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <!-- GRUPO 1 -->
                                    <tr style="background: #f1f5f9;">
                                        <td colspan="4" style="color: #1e293b; font-size: 0.7rem; font-weight: 900; padding: 10px 15px; letter-spacing: 1px; text-transform: uppercase;">1. BASE DE INVERSIÓN Y VENTA</td>
                                    </tr>
                                    <tr class="pl-row-hover">
                                        <td class="slds-p-left_large" style="font-weight: 600;">Inversión Directa (Servicios Agregados)</td>
                                        <td style="text-align: center; color: #cbd5e1;">AUTO-SUMA</td>
                                        <td class="pl-input-cell"><lightning-input type="number" variant="label-hidden" value={pl1.costo} data-field="costo" onchange={handlePL1Change} formatter="currency" step="0.01"></lightning-input></td>
                                        <td class="pl-input-cell"><lightning-input type="number" variant="label-hidden" value={pl2.costo} data-field="costo" onchange={handlePL2Change} formatter="currency" step="0.01"></lightning-input></td>
                                    </tr>
                                    <tr style="background: #f0fdf4;">
                                        <td class="slds-p-left_large slds-font-weight_bold" style="color: #166534;">Margen Bruto Objetivo (%)</td>
                                        <td class="pl-input-cell" style="background: #dcfce7; border-left: 2px solid #86efac;">
                                            <lightning-input type="number" variant="label-hidden" value={pl1.margen} data-field="margen" onchange={handleGlobalPLChange} step="0.01" class="pl-input-focus-green"></lightning-input>
                                        </td>
                                        <td style="text-align: right; font-weight: 900; color: #166534; font-size: 1.15rem; padding-right: 30px;">${res1.venta}</td>
                                        <td style="text-align: right; font-weight: 900; color: #166534; font-size: 1.15rem; padding-right: 30px;">${res2.venta}</td>
                                    </tr>

                                    <!-- GRUPO 2 -->
                                    <tr style="background: #f1f5f9;">
                                        <td colspan="4" style="color: #1e293b; font-size: 0.7rem; font-weight: 900; padding: 10px 15px; letter-spacing: 1px; text-transform: uppercase;">2. DEDUCCIONES Y GASTOS OPERATIVOS</td>
                                    </tr>
                                    <tr class="pl-row-hover">
                                        <td class="slds-p-left_large">Gastos Indirectos Corporativos (%)</td>
                                        <td class="pl-input-cell" style="background: #f8fafc; border-left: 2px solid #e2e8f0;">
                                            <lightning-input type="number" variant="label-hidden" value={pl1.indirecto} data-field="indirecto" onchange={handleGlobalPLChange} step="0.01"></lightning-input>
                                        </td>
                                        <td style="text-align: right; color: #ef4444; font-weight: 600; padding-right: 30px;">- ${res1.ind}</td>
                                        <td style="text-align: right; color: #ef4444; font-weight: 600; padding-right: 30px;">- ${res2.ind}</td>
                                    </tr>
                                    <tr class="pl-row-hover">
                                        <td class="slds-p-left_large">Comisión Comercial Agente (%)</td>
                                        <td class="pl-input-cell" style="background: #f8fafc; border-left: 2px solid #e2e8f0;">
                                            <lightning-input type="number" variant="label-hidden" value={pl1.comision1} data-field="comision1" onchange={handleGlobalPLChange} step="0.01"></lightning-input>
                                        </td>
                                        <td style="text-align: right; color: #ef4444; font-weight: 600; padding-right: 30px;">- ${res1.com1}</td>
                                        <td style="text-align: right; color: #ef4444; font-weight: 600; padding-right: 30px;">- ${res2.com1}</td>
                                    </tr>
                                    <tr class="pl-row-hover">
                                        <td class="slds-p-left_large">Comisiones Especiales / Otros (%)</td>
