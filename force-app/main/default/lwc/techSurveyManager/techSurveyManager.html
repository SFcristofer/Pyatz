<template>
    <div class="survey-card-container slds-card slds-p-around_medium">
        <!-- HEADER DEL MODULO -->
        <div class="slds-grid slds-grid_align-spread slds-m-bottom_medium border-bottom slds-p-bottom_small">
            <div class="slds-grid slds-grid_vertical-align-center">
                <div class="blue-square slds-m-right_small"></div>
                <div>
                    <h2 class="slds-text-heading_small slds-font-weight_bold">Levantamiento Técnico Digital</h2>
                    <p class="slds-text-title slds-text-color_weak">Captura de Diagnóstico en {objectApiName}</p>
                </div>
            </div>
            <div class="slds-grid">
                <lightning-button-icon icon-name="utility:refresh" variant="border-filled" onclick={connectedCallback} class="slds-m-right_x-small" title="Reiniciar Tabla"></lightning-button-icon>
                <lightning-button label="Guardar Levantamiento" variant="brand" icon-name="utility:save" onclick={handleSaveSurvey} loading={isLoading}></lightning-button>
            </div>
        </div>

        <!-- SELECTOR DE TIPO Y AGREGAR FILA -->
        <div class="slds-grid slds-grid_align-spread slds-m-bottom_medium bg-light-gray slds-p-around_small radius-8">
            <div class="slds-size_1-of-3">
                <lightning-combobox label="Seleccionar Plantilla" value={surveyType} options={surveyTypeOptions} onchange={handleSurveyTypeChange} variant="label-hidden"></lightning-combobox>
            </div>
            <lightning-button label="Nueva Línea" icon-name="utility:add" variant="brand-outline" onclick={handleAddSurveyRow}></lightning-button>
        </div>

        <!-- MOTOR DE PLANTILLAS -->
        <div class="survey-table-wrapper">
            
            <!-- PLANTILLA 1: BIOENZIMATICO -->
            <template if:true={isBio}>
                <div class="table-scroll-container"><table class="survey-table slds-table slds-table_bordered slds-table_fixed-layout" style="width: 2600px;"><thead><tr class="survey-header-group"><th colspan="4"></th><th colspan="2">EQUIPO</th><th colspan="3">TAMAÑO BIDÓN</th><th colspan="3">UBICACIÓN</th><th colspan="1"></th><th colspan="5">PRÁCTICAS DE OPERACIÓN</th><th colspan="8">INSTALACIONES</th><th colspan="1"></th></tr><tr class="slds-line-height_reset"><th style="width: 45px;">#</th><th style="width: 100px;">NIVEL</th><th style="width: 160px;">ÁREA</th><th style="width: 140px;">ZONA</th><th style="width: 70px;"># VE</th><th style="width: 70px;"># VP</th><th style="width: 70px;">#10L</th><th style="width: 70px;">#20L</th><th style="width: 70px;">#25L</th><th style="width: 70px;"># PISO</th><th style="width: 70px;"># MUEB.</th><th style="width: 70px;"># PARED</th><th style="width: 90px;">FOTO</th><th style="width: 140px;">RESIDUOS</th><th style="width: 140px;">ESCAMOCHE</th><th style="width: 140px;">INSTALAC.</th><th style="width: 120px;">AZOLVES</th><th style="width: 200px;">OBSERVACIÓN</th><th style="width: 80px;">COLAD.</th><th style="width: 80px;">TAPÓN</th><th style="width: 70px;">TARJA</th><th style="width: 80px;"># TINAS</th><th style="width: 80px;">T. GRASA</th><th style="width: 120px;">MODELO TG</th><th style="width: 70px;">ST-1</th><th style="width: 90px;">OVALINES</th><th style="width: 45px;"></th></tr></thead><tbody><template for:each={surveyData} for:item="row" for:index="index"><tr key={row.id}><td>{row.rowNumber}</td><td><input type="text" class="cell-input" data-index={index} data-field="nivel" value={row.nivel} onchange={handleSurveyChange}></td><td><input type="text" class="cell-input" data-index={index} data-field="area" value={row.area} onchange={handleSurveyChange}></td><td><input type="text" class="cell-input" data-index={index} data-field="zona" value={row.zona} onchange={handleSurveyChange}></td><td><input type="number" class="cell-input" data-index={index} data-field="ve" value={row.ve} onchange={handleSurveyChange}></td><td><input type="number" class="cell-input" data-index={index} data-field="vp" value={row.vp} onchange={handleSurveyChange}></td><td><input type="number" class="cell-input" data-index={index} data-field="b10" value={row.b10} onchange={handleSurveyChange}></td><td><input type="number" class="cell-input" data-index={index} data-field="b20" value={row.b20} onchange={handleSurveyChange}></td><td><input type="number" class="cell-input" data-index={index} data-field="b25" value={row.b25} onchange={handleSurveyChange}></td><td><input type="number" class="cell-input" data-index={index} data-field="piso" value={row.piso} onchange={handleSurveyChange}></td><td><input type="number" class="cell-input" data-index={index} data-field="mueble" value={row.mueble} onchange={handleSurveyChange}></td><td><input type="number" class="cell-input" data-index={index} data-field="pared" value={row.pared} onchange={handleSurveyChange}></td><td><lightning-button-icon icon-name="utility:image" size="small"></lightning-button-icon></td>
                <td><select class="cell-select" data-index={index} data-field="residuos" onchange={handleSurveyChange}><option value="">-</option><option value="No se detecta">No se detecta</option><option value="Se detectan">Se detectan</option></select></td>
                <td><select class="cell-select" data-index={index} data-field="escamoche" onchange={handleSurveyChange}><option value="">-</option><option value="Excelente">Excelente</option><option value="Bueno">Bueno</option><option value="Malo">Malo</option></select></td>
                <td><input type="text" class="cell-input" data-index={index} data-field="inst" value={row.inst} onchange={handleSurveyChange}></td><td><input type="text" class="cell-input" data-index={index} data-field="azolves" value={row.azolves} onchange={handleSurveyChange}></td><td><input type="text" class="cell-input" data-index={index} data-field="obs" value={row.obs} onchange={handleSurveyChange}></td><td><input type="number" class="cell-input" data-index={index} data-field="coladeras" value={row.coladeras} onchange={handleSurveyChange}></td><td><input type="number" class="cell-input" data-index={index} data-field="tapon" value={row.tapon} onchange={handleSurveyChange}></td><td><input type="number" class="cell-input" data-index={index} data-field="tarja" value={row.tarja} onchange={handleSurveyChange}></td><td><input type="number" class="cell-input" data-index={index} data-field="tinas" value={row.tinas} onchange={handleSurveyChange}></td><td><input type="number" class="cell-input" data-index={index} data-field="tg" value={row.tg} onchange={handleSurveyChange}></td><td><input type="text" class="cell-input" data-index={index} data-field="modtg" value={row.modtg} onchange={handleSurveyChange}></td><td><input type="number" class="cell-input" data-index={index} data-field="st1" value={row.st1} onchange={handleSurveyChange}></td><td><input type="number" class="cell-input" data-index={index} data-field="ovalines" value={row.ovalines} onchange={handleSurveyChange}></td><td><lightning-button-icon icon-name="utility:delete" variant="error" size="xx-small" data-index={index} onclick={handleRemoveSurveyRow}></lightning-button-icon></td></tr></template></tbody></table></div>
            </template>

            <!-- PLANTILLA 2: GRASAS -->
            <template if:true={isGrasas}>
                <div class="table-scroll-container"><table class="survey-table slds-table slds-table_bordered slds-table_fixed-layout" style="width: 1800px;"><thead><tr class="survey-header-group"><th colspan="4"></th><th colspan="5">T. GRASA (TG)</th><th colspan="5">REFACCIONES</th><th colspan="1"></th></tr><tr class="slds-line-height_reset"><th style="width: 40px;">#</th><th style="width: 100px;">NIVEL</th><th style="width: 160px;">ÁREA</th><th style="width: 140px;">ZONA</th><th style="width: 70px;">SP</th><th style="width: 70px;">ENT</th><th style="width: 140px;">MODELO</th><th style="width: 140px;">FRECUENCIA</th><th style="width: 140px;">ESTADO</th><th style="width: 80px;">TORNILLO</th><th style="width: 80px;">SELLO</th><th style="width: 80px;">MAMPARA</th><th style="width: 80px;">CANAST..</th><th style="width: 80px;">RET. SAL.</th><th style="width: 100px;">FOTO</th><th style="width: 45px;"></th></tr></thead><tbody><template for:each={surveyData} for:item="row" for:index="index"><tr key={row.id}><td>{row.rowNumber}</td><td><input type="text" class="cell-input" data-index={index} data-field="nivel" value={row.nivel} onchange={handleSurveyChange}></td><td><input type="text" class="cell-input" data-index={index} data-field="area" value={row.area} onchange={handleSurveyChange}></td><td><input type="text" class="cell-input" data-index={index} data-field="zona" value={row.zona} onchange={handleSurveyChange}></td><td><input type="number" class="cell-input" data-index={index} data-field="sp" value={row.sp} onchange={handleSurveyChange}></td><td><input type="number" class="cell-input" data-index={index} data-field="ent" value={row.ent} onchange={handleSurveyChange}></td>
                <td><select class="cell-select" data-index={index} data-field="modelo" onchange={handleSurveyChange}><option value="">-</option><option value="IG-20">IG-20</option><option value="IG-40">IG-40</option><option value="IG-60">IG-60</option><option value="IG-100">IG-100</option></select></td>
                <td><select class="cell-select" data-index={index} data-field="frecuencia" onchange={handleSurveyChange}><option value="">-</option><option value="Semanal">Semanal</option><option value="Quincenal">Quincenal</option><option value="Mensual">Mensual</option></select></td>
                <td><select class="cell-select" data-index={index} data-field="estado" onchange={handleSurveyChange}><option value="">-</option><option value="Bueno">Bueno</option><option value="Regular">Regular</option><option value="Malo">Malo</option><option value="Pésimo">Pésimo</option></select></td>
                <td><input type="number" class="cell-input" data-index={index} data-field="tornillo" value={row.tornillo} onchange={handleSurveyChange}></td><td><input type="number" class="cell-input" data-index={index} data-field="sello" value={row.sello} onchange={handleSurveyChange}></td><td><input type="number" class="cell-input" data-index={index} data-field="mampara" value={row.mampara} onchange={handleSurveyChange}></td><td><input type="number" class="cell-input" data-index={index} data-field="canastilla" value={row.canastilla} onchange={handleSurveyChange}></td><td><input type="number" class="cell-input" data-index={index} data-field="ret" value={row.ret} onchange={handleSurveyChange}></td><td><lightning-button-icon icon-name="utility:image" size="small"></lightning-button-icon></td><td><lightning-button-icon icon-name="utility:delete" variant="error" size="xx-small" data-index={index} onclick={handleRemoveSurveyRow}></lightning-button-icon></td></tr></template></tbody></table></div>
            </template>

            <!-- PLANTILLA 3: INTIMA (MANTENER CENSO COMPACTO) -->
            <template if:true={isIntima}>
                <div class="slds-grid slds-wrap slds-gutters">
                    <div class="slds-col slds-size_1-of-1 slds-large-size_5-of-12">
                        <h4 class="slds-text-title_bold slds-m-bottom_x-small">Diagnóstico Situacional</h4>
                        <table class="survey-table vertical-diag-table slds-table slds-table_bordered">
                            <tbody>
                                <tr><td class="diag-label">Usuarias Internas</td><td><input type="number" class="cell-input" value={gmUsuariasInt} data-field="gmUsuariasInt" onchange={handleGmChange}></td></tr>
                                <tr><td class="diag-label">Usuarias Externas</td><td><input type="number" class="cell-input" value={gmUsuariasExt} data-field="gmUsuariasExt" onchange={handleGmChange}></td></tr>
                                <tr><td class="diag-label">Frecuencia de Uso</td><td><select class="cell-select" data-field="gmFreqUso" onchange={handleGmChange}><option value="">-</option><option value="Lunes a viernes">Lunes a viernes</option><option value="Días alternados">Días alternados</option></select></td></tr>
                                <tr><td class="diag-label">Frecuencia Recolección</td><td><select class="cell-select" data-field="gmFreqRecoleccion" onchange={handleGmChange}><option value="">-</option><option value="7 días">7 días</option><option value="14 días">14 días</option><option value="21 días">21 días</option><option value="28 días">28 días</option></select></td></tr>
                            </tbody>
                        </table>
                    </div>
                    <div class="slds-col slds-size_1-of-1 slds-large-size_7-of-12">
                        <h4 class="slds-text-title_bold slds-m-bottom_x-small">Censo de Cubículos</h4>
                        <div class="table-scroll-container">
                            <table class="survey-table slds-table slds-table_bordered slds-table_fixed-layout">
                                <thead><tr><th style="width: 40px;">#</th><th>NIVEL</th><th>ÁREA</th><th>WC</th><th style="width: 45px;"></th></tr></thead>
                                <tbody>
                                    <template for:each={surveyData} for:item="row" for:index="index">
                                        <tr key={row.id}><td>{row.rowNumber}</td><td><input type="text" class="cell-input" data-index={index} data-field="nivel" value={row.nivel} onchange={handleSurveyChange}></td><td><input type="text" class="cell-input" data-index={index} data-field="area" value={row.area} onchange={handleSurveyChange}></td><td><input type="number" class="cell-input" data-index={index} data-field="wc" value={row.wc} onchange={handleSurveyChange}></td><td><lightning-button-icon icon-name="utility:delete" variant="error" size="xx-small" data-index={index} onclick={handleRemoveSurveyRow}></lightning-button-icon></td></tr>
                                    </template>
                                    <tr class="survey-row-totals"><td colspan="3">TOTAL WC</td><td>{surveyTotals.wc}</td><td></td></tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </template>

            <!-- PLANTILLA 4: DESAZOLVE MECANICO -->
            <template if:true={isDesazolveMec}>
                <div class="table-scroll-container"><table class="survey-table slds-table slds-table_bordered slds-table_fixed-layout" style="width: 1600px;"><thead><tr class="survey-header-group"><th colspan="4"></th><th colspan="5">SANITARIOS</th><th colspan="3"></th></tr><tr class="slds-line-height_reset"><th style="width: 40px;">#</th><th style="width: 100px;">NIVEL</th><th style="width: 160px;">ÁREA</th><th style="width: 140px;">ZONA</th><th style="width: 90px;">OVALINES</th><th style="width: 90px;">COLAD.</th><th style="width: 90px;">TAPÓN</th><th style="width: 90px;">MINGIT.</th><th style="width: 90px;">WC</th><th style="width: 110px;">MT LÍNEAL</th><th style="width: 110px;">TARJAS</th><th style="width: 130px;">CTO. HÚMEDO</th><th style="width: 45px;"></th></tr></thead><tbody><template for:each={surveyData} for:item="row" for:index="index"><tr key={row.id}><td>{row.rowNumber}</td><td><input type="text" class="cell-input" data-index={index} data-field="nivel" value={row.nivel} onchange={handleSurveyChange}></td><td><input type="text" class="cell-input" data-index={index} data-field="area" value={row.area} onchange={handleSurveyChange}></td><td><input type="text" class="cell-input" data-index={index} data-field="zona" value={row.zona} onchange={handleSurveyChange}></td><td><input type="number" class="cell-input" data-index={index} data-field="ovalines" value={row.ovalines} onchange={handleSurveyChange}></td><td><input type="number" class="cell-input" data-index={index} data-field="coladeras" value={row.coladeras} onchange={handleSurveyChange}></td><td><input type="number" class="cell-input" data-index={index} data-field="tapon" value={row.tapon} onchange={handleSurveyChange}></td><td><input type="number" class="cell-input" data-index={index} data-field="mingitorios" value={row.mingitorios} onchange={handleSurveyChange}></td><td><input type="number" class="cell-input" data-index={index} data-field="wc" value={row.wc} onchange={handleSurveyChange}></td><td><input type="number" class="cell-input" data-index={index} data-field="metros" value={row.metros} onchange={handleSurveyChange}></td><td><input type="number" class="cell-input" data-index={index} data-field="tarjas" value={row.tarjas} onchange={handleSurveyChange}></td><td><input type="text" class="cell-input" data-index={index} data-field="cto" value={row.cto} onchange={handleSurveyChange}></td><td><lightning-button-icon icon-name="utility:delete" variant="error" size="xx-small" data-index={index} onclick={handleRemoveSurveyRow}></lightning-button-icon></td></tr></template></tbody></table></div>
            </template>

            <!-- PLANTILLA 5: AROMATIZANTES -->
            <template if:true={isAromatizantes}>
                <div class="table-scroll-container"><table class="survey-table slds-table slds-table_bordered slds-table_fixed-layout"><thead><tr><th style="width: 40px;">#</th><th>NIVEL</th><th>ÁREA</th><th>ZONA</th><th># EQUIPOS ARM</th><th style="width: 45px;"></th></tr></thead><tbody><template for:each={surveyData} for:item="row" for:index="index"><tr key={row.id}><td>{row.rowNumber}</td><td><input type="text" class="cell-input" data-index={index} data-field="nivel" value={row.nivel} onchange={handleSurveyChange}></td><td><input type="text" class="cell-input" data-index={index} data-field="area" value={row.area} onchange={handleSurveyChange}></td><td><input type="text" class="cell-input" data-index={index} data-field="zona" value={row.zona} onchange={handleSurveyChange}></td><td><input type="number" class="cell-input" data-index={index} data-field="arm" value={row.arm} onchange={handleSurveyChange}></td><td><lightning-button-icon icon-name="utility:delete" variant="error" size="xx-small" data-index={index} onclick={handleRemoveSurveyRow}></lightning-button-icon></td></tr></template><tr class="survey-row-totals"><td colspan="4">TOTAL AROMATIZANTES</td><td>{surveyTotals.arm}</td><td></td></tr></tbody></table></div>
            </template>

            <!-- PLANTILLA 6: VACTOR -->
            <template if:true={isVactor}>
                <div class="table-scroll-container"><table class="survey-table slds-table slds-table_bordered slds-table_fixed-layout" style="width: 2400px;"><thead><tr class="slds-line-height_reset"><th style="width: 150px;">DESCRIPCIÓN</th><th style="width: 100px;">MEDIDA</th><th style="width: 120px;">MATERIAL</th><th style="width: 120px;">SRV REQUERIDO</th><th style="width: 60px;">LARGO</th><th style="width: 60px;">ANCHO</th><th style="width: 60px;">PROF.</th><th style="width: 80px;">MT LÍNEA</th><th style="width: 180px;">DISTANCIA</th><th style="width: 120px;">PERM. DELEG</th><th style="width: 100px;">DIFICULTAD</th><th style="width: 35px;"></th></tr></thead><tbody><template for:each={surveyData} for:item="row" for:index="index"><tr key={row.id}>
                <td><select class="cell-select" data-index={index} data-field="desc" onchange={handleSurveyChange}><option value="">-</option><option value="Cárcamo">Cárcamo</option><option value="Registro">Registro</option><option value="Trampa de Grasa">Trampa de Grasa</option><option value="Cisterna">Cisterna</option></select></td>
                <td><select class="cell-select" data-index={index} data-field="medida" onchange={handleSurveyChange}><option value="">-</option><option value="Metros Cubicos">M3</option><option value="Metros Lineales">ML</option></select></td>
                <td><input type="text" class="cell-input" data-index={index} data-field="material" value={row.material} onchange={handleSurveyChange}></td><td><input type="text" class="cell-input" data-index={index} data-field="servicio" value={row.servicio} onchange={handleSurveyChange}></td><td><input type="number" class="cell-input" data-index={index} data-field="largo" value={row.largo} onchange={handleSurveyChange}></td><td><input type="number" class="cell-input" data-index={index} data-field="ancho" value={row.ancho} onchange={handleSurveyChange}></td><td><input type="number" class="cell-input" data-index={index} data-field="prof" value={row.prof} onchange={handleSurveyChange}></td><td><input type="number" class="cell-input" data-index={index} data-field="metros" value={row.metros} onchange={handleSurveyChange}></td><td><input type="text" class="cell-input" data-index={index} data-field="distancia" value={row.distancia} onchange={handleSurveyChange}></td><td><input type="text" class="cell-input" data-index={index} data-field="permiso" value={row.permiso} onchange={handleSurveyChange}></td><td><input type="text" class="cell-input" data-index={index} data-field="dificultad" value={row.dificultad} onchange={handleSurveyChange}></td><td><lightning-button-icon icon-name="utility:delete" variant="error" size="xx-small" data-index={index} onclick={handleRemoveSurveyRow}></lightning-button-icon></td></tr></template></tbody></table></div>
            </template>
        </div>
    </div>
</template>
