<template>
    <div class="main-container">
        <!-- SPINNER DE CARGA -->
        <template if:true={isLoading}>
            <lightning-spinner alternative-text="Cargando datos..." size="medium"></lightning-spinner>
        </template>

        <!-- HEADER DE CONTROL -->
        <div class="header-section">
            <div class="slds-grid slds-grid_vertical-align-center slds-m-bottom_medium">
                <div class="slds-col slds-grid slds-grid_vertical-align-center">
                    <lightning-icon icon-name="standard:survey" size="medium" class="slds-m-right_small"></lightning-icon>
                    <h1 class="header-title">LEVANTAMIENTO TÉCNICO PYATZ</h1>
                </div>
                <div class="slds-col slds-no-flex">
                    <lightning-button 
                        label="Guardar Hallazgos" 
                        variant="brand" 
                        icon-name="utility:save" 
                        onclick={handleSave}
                        class="slds-m-right_small"
                        disabled={isSaving}>
                    </lightning-button>
                </div>
            </div>
            
            <div class="type-selector slds-grid slds-grid_vertical-align-end">
                <div class="slds-col">
                    <lightning-combobox 
                        label="Seleccione el Tipo de Servicio a Levantar" 
                        value={surveyType} 
                        options={surveyTypeOptions} 
                        onchange={handleSurveyTypeChange}
                        variant="label-stacked">
                    </lightning-combobox>
                </div>
                <div class="slds-col slds-no-flex slds-m-left_small">
                    <lightning-button-icon 
                        icon-name="utility:settings" 
                        variant="border-filled" 
                        alternative-text="Configurar Tabla" 
                        title="Configurar Tabla"
                        onclick={handleOpenConfig}>
                    </lightning-button-icon>
                </div>
            </div>
        </div>

        <!-- MESA DE DISEÑO INTEGRADA (MODAL LARGE) -->
        <template if:true={isConfigModalOpen}>
            <section role="dialog" tabindex="-1" class="slds-modal slds-fade-in-open slds-modal_large">
                <div class="slds-modal__container">
                    <header class="config-modal-header slds-modal__header">
                        <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse" title="Cerrar" onclick={handleCloseConfig}>
                            <lightning-icon icon-name="utility:close" size="small" variant="inverse"></lightning-icon>
                        </button>
                        <h2 class="slds-text-heading_medium">Diseñador de Tablas Pyatz</h2>
                        <div class="slds-m-top_small slds-grid slds-grid_align-center">
                            <div class="slds-col slds-size_1-of-3">
                                <lightning-input 
                                    label="Nombre del Servicio" 
                                    value={surveyType}
                                    onchange={handleSurveyTypeChangeInModal}
                                    variant="label-hidden"
                                    placeholder="Nombre de la nueva tabla..."
                                    required>
                                </lightning-input>
                            </div>
                        </div>
                    </header>
                    
                    <div class="config-modal-body slds-modal__content slds-p-around_medium">
                        <p class="slds-m-bottom_medium slds-text-align_center slds-text-color_weak">
                            Configure las columnas de su tabla técnica. Los técnicos verán exactamente este orden y diseño.
                        </p>

                        <div class="table-scroll-container">
                            <table class="survey-table" style="width: auto; min-width: 100%;">
                                <thead>
                                    <tr class="slds-line-height_reset">
                                        <th style="width: 50px;">#</th>
                                        <template for:each={dynamicColumns} for:item="col" for:index="index">
                                            <th key={col.id} style="width: 220px; vertical-align: top;" class="slds-p-around_x-small">
                                                <div class="config-column-card">
                                                    <lightning-combobox
                                                        label="Campo Salesforce"
                                                        variant="label-hidden"
                                                        value={col.apiName}
                                                        options={availableFields}
                                                        data-index={index}
                                                        onchange={handleConfigColumnChange}
                                                        class="slds-m-bottom_xx-small">
                                                    </lightning-combobox>
                                                    <lightning-input 
                                                        label="Etiqueta"
                                                        variant="label-hidden"
                                                        value={col.label}
                                                        placeholder="Nombre columna"
                                                        data-index={index}
                                                        onchange={handleConfigLabelChange}>
                                                    </lightning-input>
                                                    <div class="slds-text-align_right slds-m-top_xx-small">
                                                        <lightning-button-icon 
                                                            icon-name="utility:delete" 
                                                            variant="error" 
                                                            size="small"
                                                            data-index={index} 
                                                            onclick={handleRemoveConfigColumn}>
                                                        </lightning-button-icon>
                                                    </div>
                                                </div>
                                            </th>
                                        </template>
                                        <th style="width: 60px; vertical-align: middle;" class="slds-text-align_center">
                                            <lightning-button-icon 
                                                icon-name="utility:add" 
                                                variant="brand" 
                                                size="large"
                                                title="Añadir Columna"
                                                onclick={handleAddConfigColumn}>
                                            </lightning-button-icon>
                                        </th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr class="slds-hint-parent">
                                        <td>1</td>
                                        <template for:each={dynamicColumns} for:item="col">
                                            <td key={col.id}>
                                                <div class="config-preview-placeholder">EJEMPLO DE DATO</div>
                                            </td>
                                        </template>
                                        <td></td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                    
                    <footer class="slds-modal__footer pyatz-modal-footer">
                        <div class="slds-grid slds-grid_align-spread">
                            <div>
                                <template if:true={currentTableConfig}>
                                    <lightning-button label={currentStatusLabel} variant={currentStatusVariant} onclick={handleToggleStatus}></lightning-button>
                                </template>
                            </div>
                            <div>
                                <lightning-button label="Cancelar" onclick={handleCloseConfig} class="slds-m-right_x-small"></lightning-button>
                                <lightning-button
                                    label="Publicar y Activar Tabla"
                                    variant="success"
                                    icon-name="utility:cloud_upload"
                                    onclick={handleSaveConfig}>
                                </lightning-button>
                            </div>
                        </div>
                    </footer>
                </div>
            </section>
            <div class="slds-backdrop slds-backdrop_open"></div>
        </template>

        <div class="survey-wrapper">
            <!-- 0. TABLA DINÁMICA (PARA NUEVOS SERVICIOS) -->
            <template if:true={isDynamic}>
                <div class="table-scroll-container">
                    <table class="survey-table" style="width: auto; min-width: 100%;">
                        <thead>
                            <tr class="slds-line-height_reset">
                                <th style="width: 45px;">#</th>
                                <template for:each={dynamicColumns} for:item="col">
                                    <th key={col.id} style="width: 180px; min-width: 150px;">{col.label}</th>
                                </template>
                                <th style="width: 50px;"></th>
                            </tr>
                        </thead>
                        <tbody>
                            <template for:each={surveyData} for:item="row" for:index="rowIndex">
                                <tr key={row.id}>
                                    <td><div class="cell-input">{row.rowNumber}</div></td>
                                    <template for:each={row.cells} for:item="cell">
                                        <td key={cell.field}>
                                            <input 
                                                type="text" 
                                                class="cell-input" 
                                                value={cell.value} 
                                                data-row-index={rowIndex}
                                                data-field={cell.field}
                                                onchange={handleDynamicChange}>
                                        </td>
                                    </template>
                                    <td><lightning-button-icon icon-name="utility:delete" variant="error" size="xx-small" data-index={rowIndex} onclick={handleRemoveSurveyRow}></lightning-button-icon></td>
                                </tr>
                            </template>
                        </tbody>
                    </table>
                </div>
            </template>

            <!-- 1. TABLA BIOENZIMÁTICO -->
            <template if:true={isBio}>
                <div class="table-scroll-container">
                    <table class="survey-table" style="width: 3200px;">
                        <thead>
                            <tr class="survey-header-group">
                                <th colspan="4">DATOS BASE</th>
                                <th colspan="2">EQUIPO</th>
                                <th colspan="3">TAMAÑO BIDÓN</th>
                                <th colspan="3">UBICACIÓN</th>
                                <th colspan="1">REGISTRO</th>
                                <th colspan="5">PRÁCTICAS OPERATIVAS</th>
                                <th colspan="8">INSTALACIONES</th>
                                <th colspan="1"></th>
                            </tr>
                            <tr class="slds-line-height_reset">
                                <th style="width: 45px;">#</th>
                                <th style="width: 110px;">NIVEL</th>
                                <th style="width: 220px;">ÁREA COCINA O BAÑOS</th>
                                <th style="width: 180px;">ZONA / GÉNERO</th>
                                <th style="width: 80px;"># VE</th>
                                <th style="width: 80px;"># VP</th>
                                <th style="width: 80px;">#10L</th>
                                <th style="width: 80px;">#20L</th>
                                <th style="width: 80px;">#25L</th>
                                <th style="width: 90px;"># PISO</th>
                                <th style="width: 100px;"># MUEBLE</th>
                                <th style="width: 100px;"># PARED</th>
                                <th style="width: 160px;">FOTOGRAFÍA</th>
                                <th style="width: 180px;">RESIDUOS TARJA</th>
                                <th style="width: 160px;">ESCAMOCHE</th>
                                <th style="width: 160px;">INSTALACIONES</th>
                                <th style="width: 130px;">AZOLVES</th>
                                <th style="width: 250px;">OBSERVACIÓN</th>
                                <th style="width: 120px;">COLADERAS</th>
                                <th style="width: 180px;">TAPÓN REGISTRO</th>
                                <th style="width: 90px;">TARJA</th>
                                <th style="width: 180px;"># TINAS X TARJA</th>
                                <th style="width: 120px;">T. GRASA</th>
                                <th style="width: 160px;">MODELO TG</th>
                                <th style="width: 100px;">ST-1</th>
                                <th style="width: 180px;">OVALINES / LAVABO</th>
                                <th style="width: 50px;"></th>
                            </tr>
                        </thead>
                        <tbody>
                            <template for:each={surveyData} for:item="row" for:index="index">
                                <tr key={row.id}>
                                    <td><div class="cell-input">{row.rowNumber}</div></td>
                                    <td><input type="text" class="cell-input" data-index={index} data-field="nivel" value={row.nivel} onchange={handleSurveyChange}></td>
                                    <td><input type="text" class="cell-input" data-index={index} data-field="area" value={row.area} onchange={handleSurveyChange}></td>
                                    <td><input type="text" class="cell-input" data-index={index} data-field="zona" value={row.zona} onchange={handleSurveyChange}></td>
                                    <td><input type="number" class="cell-input" data-index={index} data-field="ve" value={row.ve} onchange={handleSurveyChange}></td>
                                    <td><input type="number" class="cell-input" data-index={index} data-field="vp" value={row.vp} onchange={handleSurveyChange}></td>
                                    <td><input type="number" class="cell-input" data-index={index} data-field="c10l" value={row.c10l} onchange={handleSurveyChange}></td>
                                    <td><input type="number" class="cell-input" data-index={index} data-field="c20l" value={row.c20l} onchange={handleSurveyChange}></td>
                                    <td><input type="number" class="cell-input" data-index={index} data-field="c25l" value={row.c25l} onchange={handleSurveyChange}></td>
                                    <td><input type="number" class="cell-input" data-index={index} data-field="piso" value={row.piso} onchange={handleSurveyChange}></td>
                                    <td><input type="number" class="cell-input" data-index={index} data-field="mueble" value={row.mueble} onchange={handleSurveyChange}></td>
                                    <td><input type="number" class="cell-input" data-index={index} data-field="pared" value={row.pared} onchange={handleSurveyChange}></td>
                                    <td><input type="text" class="cell-input" data-index={index} data-field="foto" value={row.foto} onchange={handleSurveyChange}></td>
                                    <td>
                                        <select class="cell-select" data-index={index} data-field="residuos" value={row.residuos} onchange={handleSurveyChange}>
                                            <option value="">-</option>
                                            <option value="Sin residuos (Correcto)">No</option>
                                            <option value="Presencia de residuos sólidos">Sí</option>
                                        </select>
                                    </td>
                                    <td>
                                        <select class={row.escamocheClass} data-index={index} data-field="escamoche" value={row.escamoche} onchange={handleSurveyChange}>
                                            <option value="">-</option>
                                            <option value="Correcto, separan orgánico e inorgánico">Correcto</option>
                                            <option value="Lo hacen a medias, basura en suelo, botes con basura revuelta">A medias</option>
                                            <option value="Pésimo, tarjas, pisos y coladeras con basura; no hay cuidado">Pésimo</option>
                                        </select>
                                    </td>
                                    <td>
                                        <select class="cell-select" data-index={index} data-field="instala" value={row.instala} onchange={handleSurveyChange}>
                                            <option value="">-</option>
                                            <option value="Bien">Bien</option>
                                            <option value="Regular">Regular</option>
                                            <option value="Mal">Mal</option>
                                        </select>
                                    </td>
                                    <td>
                                        <select class="cell-select" data-index={index} data-field="azolves" value={row.azolves} onchange={handleSurveyChange}>
                                            <option value="NA">NA</option>
                                            <option value="1 año">1 año</option>
                                            <option value="1 mes">1 mes</option>
                                            <option value="2 quin">2 quin</option>
                                            <option value="1 sem">1 sem</option>
                                        </select>
                                    </td>
                                    <td><input type="text" class="cell-input" data-index={index} data-field="obs" value={row.obs} onchange={handleSurveyChange}></td>
                                    <td><input type="number" class="cell-input" data-index={index} data-field="coladeras" value={row.coladeras} onchange={handleSurveyChange}></td>
                                    <td><input type="number" class="cell-input" data-index={index} data-field="tapon" value={row.tapon} onchange={handleSurveyChange}></td>
                                    <td><input type="number" class="cell-input" data-index={index} data-field="tarja" value={row.tarja} onchange={handleSurveyChange}></td>
                                    <td><input type="number" class="cell-input" data-index={index} data-field="tinas" value={row.tinas} onchange={handleSurveyChange}></td>
                                    <td><input type="number" class="cell-input" data-index={index} data-field="tgrasa" value={row.tgrasa} onchange={handleSurveyChange}></td>
                                    <td><input type="text" class="cell-input" data-index={index} data-field="modelo" value={row.modelo} onchange={handleSurveyChange}></td>
                                    <td><input type="number" class="cell-input" data-index={index} data-field="st1" value={row.st1} onchange={handleSurveyChange}></td>
                                    <td><input type="number" class="cell-input" data-index={index} data-field="ovalines" value={row.ovalines} onchange={handleSurveyChange}></td>
                                    <td><lightning-button-icon icon-name="utility:delete" variant="error" size="xx-small" data-index={index} onclick={handleRemoveSurveyRow}></lightning-button-icon></td>
                                </tr>
                            </template>
                            <tr class="survey-row-totals">
                                <td colspan="4" class="total-label-cell">TOTALES ACUMULADOS</td>
                                <td>{surveyTotals.ve}</td><td>{surveyTotals.vp}</td>
                                <td>{surveyTotals.c10l}</td><td>{surveyTotals.c20l}</td><td>{surveyTotals.c25l}</td>
                                <td>{surveyTotals.piso}</td><td>{surveyTotals.mueble}</td><td>{surveyTotals.pared}</td>
                                <td colspan="6"></td>
                                <td>{surveyTotals.coladeras}</td><td>{surveyTotals.tapon}</td><td>{surveyTotals.tarja}</td><td>{surveyTotals.tinas}</td><td>{surveyTotals.tgrasa}</td>
                                <td></td><td>{surveyTotals.st1}</td><td>{surveyTotals.ovalines}</td><td></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </template>

            <!-- 2. TABLA GRASAS -->
            <template if:true={isGrasas}>
                <div class="table-scroll-container">
                    <table class="survey-table" style="width: 2100px;">
                        <thead>
                            <tr class="survey-header-group">
                                <th colspan="4">IDENTIFICACIÓN</th>
                                <th colspan="5">EQUIPOS TG</th>
                                <th colspan="5">REFACCIONES / ESTADO</th>
                                <th colspan="1">REGISTRO</th>
                                <th colspan="1"></th>
                            </tr>
                            <tr class="slds-line-height_reset">
                                <th style="width: 40px;">#</th>
                                <th style="width: 100px;">NIVEL</th>
                                <th style="width: 220px;">ÁREA COCINA O BAÑOS</th>
                                <th style="width: 180px;">ZONA / GÉNERO</th>
                                <th style="width: 70px;">SP</th>
                                <th style="width: 70px;">ENT</th>
                                <th style="width: 140px;">MODELO</th>
                                <th style="width: 200px;">FRECUENCIA DE LIMPIEZA</th>
                                <th style="width: 160px;">ESTADO DE TRAMPA</th>
                                <th style="width: 100px;">TORNILLO</th>
                                <th style="width: 100px;">SELLO</th>
                                <th style="width: 110px;">MAMPARA</th>
                                <th style="width: 120px;">CANASTILLA</th>
                                <th style="width: 120px;">RET. SALIDA</th>
                                <th style="width: 160px;">FOTOGRAFÍA</th>
                                <th style="width: 45px;"></th>
                            </tr>
                        </thead>
                        <tbody>
                            <template for:each={surveyData} for:item="row" for:index="index">
                                <tr key={row.id}>
                                    <td><div class="cell-input">{row.rowNumber}</div></td>
                                    <td><input type="text" class="cell-input" data-index={index} data-field="nivel" value={row.nivel} onchange={handleSurveyChange}></td>
                                    <td><input type="text" class="cell-input" data-index={index} data-field="area" value={row.area} onchange={handleSurveyChange}></td>
                                    <td><input type="text" class="cell-input" data-index={index} data-field="zona" value={row.zona} onchange={handleSurveyChange}></td>
                                    <td><input type="number" class="cell-input" data-index={index} data-field="sp" value={row.sp} onchange={handleSurveyChange}></td>
                                    <td><input type="number" class="cell-input" data-index={index} data-field="ent" value={row.ent} onchange={handleSurveyChange}></td>
                                    <td>
                                        <select class="cell-select" data-index={index} data-field="modelo" onchange={handleSurveyChange}>
                                            <option value="">-</option><option value="IG-20">IG-20</option><option value="IG-40">IG-40</option><option value="CORIAT">CORIAT</option><option value="INTERNATIONAL">INTERNATIONAL</option><option value="OTRO">OTRO</option>
                                        </select>
                                    </td>
                                    <td>
                                        <select class="cell-select" data-index={index} data-field="frecuencia" onchange={handleSurveyChange}>
                                            <option value="">-</option><option value="1 VEZ A LA SEMANA">1 VEZ A LA SEMANA</option><option value="1 VEZ A LA QUINCENA">1 VEZ A LA QUINCENA</option><option value="1 VEZ AL MES">1 VEZ AL MES</option>
                                        </select>
                                    </td>
                                    <td>
                                        <select class={row.estadoClass} data-index={index} data-field="estado" onchange={handleSurveyChange}>
                                            <option value="">-</option><option value="EN BUEN ESTADO">EN BUEN ESTADO</option><option value="EN MAL ESTADO">EN MAL ESTADO</option><option value="EN PESIMO ESTADO">EN PESIMO ESTADO</option>
                                        </select>
                                    </td>
                                    <td><input type="number" class="cell-input" data-index={index} data-field="tornillo" value={row.tornillo} onchange={handleSurveyChange}></td>
                                    <td><input type="number" class="cell-input" data-index={index} data-field="sello" value={row.sello} onchange={handleSurveyChange}></td>
                                    <td><input type="number" class="cell-input" data-index={index} data-field="mampara" value={row.mampara} onchange={handleSurveyChange}></td>
                                    <td><input type="number" class="cell-input" data-index={index} data-field="canastilla" value={row.canastilla} onchange={handleSurveyChange}></td>
                                    <td><input type="number" class="cell-input" data-index={index} data-field="retSalida" value={row.retSalida} onchange={handleSurveyChange}></td>
                                    <td><input type="text" class="cell-input" data-index={index} data-field="foto" value={row.foto} onchange={handleSurveyChange}></td>
                                    <td><lightning-button-icon icon-name="utility:delete" variant="error" size="xx-small" data-index={index} onclick={handleRemoveSurveyRow}></lightning-button-icon></td>
                                </tr>
                            </template>
                            <tr class="survey-row-totals">
                                <td colspan="4" class="total-label-cell">TOTALES ACUMULADOS</td>
                                <td>{surveyTotals.sp}</td><td>{surveyTotals.ent}</td>
                                <td colspan="3"></td>
                                <td>{surveyTotals.tornillo}</td><td>{surveyTotals.sello}</td><td>{surveyTotals.mampara}</td><td>{surveyTotals.canastilla}</td><td>{surveyTotals.retSalida}</td>
                                <td colspan="2"></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </template>

            <!-- 3. GESTIÓN MENSTRUAL (ÍNTIMA) -->
            <template if:true={isIntima}>
                <!-- DIAGNÓSTICO -->
                <div class="diag-card">
                    <div class="diag-header">
                        <lightning-icon icon-name="utility:answer" size="small" variant="inverse" class="slds-m-right_small"></lightning-icon>
                        <h3 class="slds-text-heading_small">Diagnóstico Situacional - Gestión Menstrual</h3>
                    </div>
                    <table class="diag-table">
                        <tr><td class="diag-label"># Usuarias Internas</td><td><input type="number" class="cell-input" data-field="gmUsuariasInt" value={gmUsuariasInt} onchange={handleGmChange}></td></tr>
                        <tr><td class="diag-label"># Usuarias Externas</td><td><input type="number" class="cell-input" data-field="gmUsuariasExt" value={gmUsuariasExt} onchange={handleGmChange}></td></tr>
                        <tr><td class="diag-label">Frecuencia de Uso</td><td>
                            <select class="cell-select" data-field="gmFreqUso" onchange={handleGmChange}>
                                <option value="">-</option>
                                <option value="Lunes a viernes" selected={isGmFreqLV}>Lunes a viernes</option>
                                <option value="Días alternados (ej. home office)" selected={isGmFreqAlt}>Días alternados (ej. home office)</option>
                            </select>
                        </td></tr>
                        <tr><td class="diag-label"># Sanitarios Totales</td><td><input type="number" class="cell-input" data-field="gmSanitarios" value={gmSanitarios} onchange={handleGmChange}></td></tr>
                        <tr><td class="diag-label"># Cubículos Totales</td><td><input type="number" class="cell-input" data-field="gmCubiculos" value={gmCubiculos} onchange={handleGmChange}></td></tr>
                        <tr><td class="diag-label"># Contenedores Sugeridos</td><td><input type="number" class="cell-input" data-field="gmContenedores" value={gmContenedores} onchange={handleGmChange}></td></tr>
                        <tr><td class="diag-label">Frecuencia de Recolección</td><td>
                            <select class="cell-select" data-field="gmFreqRecoleccion" onchange={handleGmChange}>
                                <option value="">-</option>
                                <option value="7 días" selected={isGmRec7}>7 días</option>
                                <option value="14 días" selected={isGmRec14}>14 días</option>
                                <option value="21 días" selected={isGmRec21}>21 días</option>
                                <option value="28 días" selected={isGmRec28}>28 días</option>
                                <option value="Otro:" selected={isGmRecOtro}>Otro:</option>
                            </select>
                        </td></tr>
                        <tr><td class="diag-label">Días de Servicio</td><td>
