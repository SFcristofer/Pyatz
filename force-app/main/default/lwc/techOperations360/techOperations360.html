<template>
    <!-- VISTA DASHBOARD (PIPELINE) -->
    <template if:true={showDashboard}>
        <div class="slds-box slds-theme_default" style="min-height: 80vh; background: #fdfdfd;">
            <!-- HEADER DASHBOARD -->
            <header class="slds-m-bottom_medium slds-grid slds-grid_align-spread slds-grid_vertical-align-center">
                <div class="slds-grid slds-grid_vertical-align-center">
                    <lightning-icon icon-name="standard:opportunity" size="medium" class="slds-m-right_small"></lightning-icon>
                    <div>
                        <h1 class="slds-text-heading_medium slds-font-weight_bold">Oportunidades</h1>
                        <p class="slds-text-color_weak slds-text-body_small">Seleccione la oportunidad</p>
                    </div>
                </div>
                <div>
                    <lightning-button label="Nueva Oportunidad" variant="brand" icon-name="utility:add" onclick={handleNewOpportunity}></lightning-button>
                </div>
            </header>

            <!-- LOADING SPINNER -->
            <div if:true={isLoading} class="slds-is-relative slds-m-vertical_large">
                <lightning-spinner alternative-text="Cargando oportunidades..." size="medium"></lightning-spinner>
            </div>

            <!-- TABLA DE OPORTUNIDADES -->
            <div if:false={isLoading} style="height: 600px;">
                <lightning-datatable
                    key-field="id"
                    data={opportunities}
                    columns={columns}
                    hide-checkbox-column
                    onrowaction={handleRowAction}>
                </lightning-datatable>
            </div>
        </div>
    </template>

    <!-- VISTA EXPEDIENTE 360 (WIZARD) -->
    <template if:false={showDashboard}>
        <div class="slds-box slds-theme_default" style="min-height: 80vh; background: #fdfdfd;">
            
            <!-- HEADER DEL EXPEDIENTE 360 -->
            <header class="slds-m-bottom_medium slds-grid slds-grid_align-spread slds-grid_vertical-align-center">
                <div class="slds-grid slds-grid_vertical-align-center">
                    <lightning-icon icon-name="standard:omni_channel" size="medium" class="slds-m-right_small"></lightning-icon>
                    <div>
                        <h1 class="slds-text-heading_medium slds-font-weight_bold">Expediente Comercial</h1>
                        <p class="slds-text-color_weak slds-text-body_small">Proceso integral Pyatz: {subPhase}</p>
                    </div>
                </div>
                <div class="slds-grid slds-grid_vertical-align-center">
                    <lightning-button-icon icon-name="utility:event" variant="border-filled" class="slds-m-right_small calendar-icon-only" style="--slds-c-icon-color-foreground: #0070d2; border-color: #0070d2;" onclick={handleOpenCalendar} tooltip="Ver Cronograma de Actividades"></lightning-button-icon>
                    <lightning-button-icon icon-name="utility:slack" variant="border-filled" class="slds-m-right_small slack-icon-only" style="--slds-c-icon-color-foreground: #4A154B; border-color: #4A154B;" onclick={handleOpenSlack} tooltip="Abrir Slack 360"></lightning-button-icon>
                    <lightning-button label="Volver a lista principal" icon-name="utility:back" onclick={handleBackToDashboard}></lightning-button>
                </div>
            </header>

            <!-- INFORMACIÓN DE LA OPORTUNIDAD -->
            <div class="slds-box slds-theme_shade slds-m-bottom_medium">
                <h3 class="slds-text-heading_small slds-m-bottom_small slds-p-horizontal_small" style="color: #0070d2; font-weight: bold; border-left: 3px solid #0070d2;">
                    Información de la Oportunidad
                </h3>
                <lightning-record-view-form record-id={effectiveRecordId} object-api-name="Opportunity">
                    <div class="slds-grid slds-wrap slds-p-horizontal_small">
                        <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                            <lightning-output-field field-name="AccountId"></lightning-output-field>
                            <lightning-output-field field-name="Name"></lightning-output-field>
                            <lightning-output-field field-name="Amount"></lightning-output-field>
                        </div>
                        <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                            <lightning-output-field field-name="CloseDate"></lightning-output-field>
                            <lightning-output-field field-name="StageName"></lightning-output-field>
                            <div class="slds-p-around_x-small slds-m-top_x-small" style="background: white; border-radius: 4px; border: 1px solid #e0e5ee;">
                                <div class="slds-grid slds-grid_align-spread slds-m-bottom_xx-small">
                                    <span class="slds-text-title_bold" style="color: #0070d2;">Avance del Expediente</span>
                                    <span class="slds-text-title_bold">{overallProgress}%</span>
                                </div>
                                <lightning-progress-bar value={overallProgress} size="medium" variant="circular"></lightning-progress-bar>
                            </div>
                        </div>
                    </div>
                </lightning-record-view-form>
            </div>

            <!-- NAVEGACIÓN -->
            <div class="slds-m-vertical_medium">
                <lightning-progress-indicator current-step={currentStep} type="path" variant="base">
                    <template for:each={stages} for:item="stage">
                        <lightning-progress-step key={stage.value} label={stage.label} value={stage.value} onclick={handleStepClick}></lightning-progress-step>
                    </template>
                </lightning-progress-indicator>
            </div>

            <div class="substage-toolbar slds-m-bottom_medium">
                <lightning-progress-indicator current-step={currentSubStep} type="path" variant="base" class="substage-path">
                    <template for:each={currentSubStages} for:item="sub">
                        <lightning-progress-step key={sub.value} label={sub.label} value={sub.value} onclick={handleSubStepClick}></lightning-progress-step>
                    </template>
                </lightning-progress-indicator>
            </div>

            <div class="module-container slds-p-around_medium">
                <template if:true={isLevantamientoPhase}>
                    <c-tech-levantamiento-manager record-id={effectiveRecordId}></c-tech-levantamiento-manager>
                </template>
                <template if:true={isMemoriaPhase}>
                    <c-tech-memoria-manager record-id={effectiveRecordId}></c-tech-memoria-manager>
                </template>
                <template if:true={isDefSolucionPhase}>
                    <c-tech-solution-costing record-id={effectiveRecordId}></c-tech-solution-costing>
                </template>
                <template if:true={isPresupuestoPhase}>
                    <template if:true={showQuoteList}>
                        <c-tech-quote-list opportunity-id={effectiveRecordId} oneditquote={handleEditQuote} oncreatenew={handleCreateNewQuote}></c-tech-quote-list>
                    </template>
                    <template if:true={showQuoteEditor}>
                        <div class="slds-m-bottom_small">
                            <lightning-button label="Volver al Listado" icon-name="utility:back" onclick={handleBackToQuoteList}></lightning-button>
                        </div>
                        <c-tech-quote-editor record-id={selectedQuoteId} opportunity-id={effectiveRecordId}></c-tech-quote-editor>
                    </template>
                </template>
                <template if:true={isEnvioPhase}>
                    <c-tech-communication-hub record-id={effectiveRecordId}></c-tech-communication-hub>
                </template>
                <template if:true={isSeguimientoPhase}>
                    <c-tech-tactical-follow-up record-id={effectiveRecordId}></c-tech-tactical-follow-up>
                </template>
                <template if:true={isContratoPhase}>
                    <c-tech-contract-manager record-id={effectiveRecordId} oncontractgenerated={handleContractGenerated}></c-tech-contract-manager>
                </template>
                <template if:true={isWorkOrderPhase}>
                    <c-tech-work-order-console record-id={effectiveRecordId} quote-id={selectedQuoteId} service-contract-id={selectedContractId}></c-tech-work-order-console>
                </template>
                <template if:true={isEnhorabuenaPhase}>
                    <c-tech-communication-hub record-id={effectiveRecordId} folder-name="Enhorabuena"></c-tech-communication-hub>
                </template>
                <template if:true={isAutorizacionPhase}>
                    <c-tech-process-summary record-id={effectiveRecordId}></c-tech-process-summary>
                </template>
                <template if:true={isAltaCliente}>
                    <c-tech-document-manager record-id={effectiveRecordId}></c-tech-document-manager>
                </template>
                <template if:true={isAltaPyatz}>
                    <c-tech-pyatz-document-manager record-id={effectiveRecordId}></c-tech-pyatz-document-manager>
                </template>
                <template if:true={isCalendarioPhase}>
                    <c-tech-resource-calendar record-id={effectiveRecordId}></c-tech-resource-calendar>
                </template>
            </div>

            <!-- NAVEGACIÓN -->
            <div class="slds-m-top_medium slds-grid slds-grid_align-spread slds-grid_vertical-align-center">
                <lightning-button label="Anterior" variant="neutral" icon-name="utility:back" onclick={handlePrev} disabled={isFirstStep}></lightning-button>
                <div class="slds-grid slds-grid_vertical-align-center">
                    <div class="slds-m-right_medium" style="width: 250px;">
                        <lightning-combobox label="Estado" placeholder="Estado..." value={currentStatus} options={statusOptions} onchange={handleStatusChange} variant="label-hidden" class="status-combobox" required></lightning-combobox>
                    </div>
                    <lightning-button label="Guardar y Continuar" variant="brand" icon-name="utility:forward" icon-position="right" onclick={handleNext} disabled={isLastStep}></lightning-button>
                </div>
            </div>
        </div>
    </template>

    <!-- MODAL DINÁMICO (BASADO EN ACCIÓN RÁPIDA) -->
    <template if:true={isCreationModalOpen}>
        <section role="dialog" tabindex="-1" class="slds-modal slds-fade-in-open slds-modal_medium">
            <div class="slds-modal__container">
                <header class="slds-modal__header">
                    <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse" title="Cerrar" onclick={closeCreationModal}>
                        <lightning-icon icon-name="utility:close" size="small" variant="inverse"></lightning-icon>
                    </button>
                    <h2 class="slds-text-heading_medium">Nuevo Proyecto Pyatz</h2>
                </header>
                <div class="slds-modal__content slds-p-around_medium">
                    <lightning-record-edit-form object-api-name="Opportunity" onsuccess={handleOpportunitySuccess}>
                        <lightning-messages></lightning-messages>
                        
                        <!-- RENDERIZADO DINÁMICO DE CAMPOS EN 2 COLUMNAS -->
                        <div class="slds-grid slds-wrap">
                            <template for:each={opportunityFields} for:item="f">
                                <div key={f} class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-p-around_x-small">
                                    <lightning-input-field field-name={f}></lightning-input-field>
                                </div>
                            </template>
                            
                            <!-- Campo oculto para vinculación automática al cliente actual -->
                            <div class="slds-hide">
                                <lightning-input-field field-name="AccountId" value={recordId}></lightning-input-field>
                            </div>
                        </div>

                        <div class="slds-m-top_medium slds-text-align_right">
                            <lightning-button label="Cancelar" onclick={closeCreationModal} class="slds-m-right_small"></lightning-button>
                            <lightning-button type="submit" label="Crear e Iniciar 360" variant="brand"></lightning-button>
                        </div>
                    </lightning-record-edit-form>
                </div>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>
</template>
