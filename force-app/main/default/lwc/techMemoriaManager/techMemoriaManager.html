<template>
    <div class="memoria-container">
        <lightning-layout multiple-rows="true" vertical-align="stretch">
            <!-- COLUMNA IZQUIERDA: EXPLORADOR DE DETALLES TÉCNICOS -->
            <lightning-layout-item size="12" large-device-size="5" padding="around-small">
                <div class="summary-card slds-p-around_medium">
                    <div class="slds-grid slds-grid_vertical-align-center slds-m-bottom_small">
                        <lightning-icon icon-name="standard:report" size="small" class="slds-m-right_small"></lightning-icon>
                        <h2 class="title">Detalle del Levantamiento</h2>
                    </div>
                    
                    <template lwc:if={groupedDetails.length}>
                        <div class="details-scroll">
                            <lightning-accordion allow-multiple-sections-open>
                                <template for:each={groupedDetails} for:item="group">
                                    <lightning-accordion-section key={group.label} name={group.label} label={group.label}>
                                        <div class="records-grid">
                                            <template for:each={group.records} for:item="rec">
                                                <div key={rec.id} class="record-detail-card slds-m-bottom_small">
                                                    <div class="record-header slds-grid slds-grid_align-spread">
                                                        <span class="record-name">{rec.name}</span>
                                                    </div>
                                                    <div class="record-body">
                                                        <template for:each={rec.fields} for:item="f">
                                                            <div key={f.label} class="field-row">
                                                                <span class="f-label">{f.label}:</span>
                                                                <span class="f-value">{f.value}</span>
                                                            </div>
                                                        </template>
                                                        <div if:true={rec.obs} class="field-row obs-row">
                                                            <span class="f-label">Notas:</span>
                                                            <p class="f-obs">{rec.obs}</p>
                                                        </div>
                                                    </div>
                                                </div>
                                            </template>
                                        </div>
                                    </lightning-accordion-section>
                                </template>
                            </lightning-accordion>
                        </div>
                    </template>
                    <template lwc:else>
                        <div class="empty-state slds-text-align_center slds-p-around_large">
                            <lightning-icon icon-name="utility:info" size="medium" variant="warning"></lightning-icon>
                            <p class="slds-m-top_small">No se encontraron hallazgos técnicos registrados.</p>
                        </div>
                    </template>
                </div>
            </lightning-layout-item>

            <!-- COLUMNA DERECHA: EDITOR DE MEMORIA DESCRIPTIVA -->
            <lightning-layout-item size="12" large-device-size="7" padding="around-small">
                <div class="editor-card slds-p-around_medium">
                    <div class="slds-grid slds-grid_vertical-align-center slds-m-bottom_small">
                        <lightning-icon icon-name="standard:post" size="small" class="slds-m-right_small"></lightning-icon>
                        <h2 class="title">Memoria Descriptiva del Servicio</h2>
                    </div>
                    
                    <lightning-input-rich-text
                        label="Descripción de la Solución"
                        placeholder="Redacte aquí la descripción técnica detallada del levantamiento y la solución propuesta..."
                        value={memoriaText}
                        onchange={handleTextChange}
                        class="rich-editor"
                        variant="bottom-toolbar">
                    </lightning-input-rich-text>

                    <div class="slds-m-top_medium slds-text-align_right">
                        <lightning-button 
                            variant="brand" 
                            label="Guardar Memoria" 
                            icon-name="utility:save"
                            onclick={handleSave}
                            disabled={isSaving}>
                        </lightning-button>
                    </div>
                </div>
            </lightning-layout-item>
        </lightning-layout>
    </div>
</template>
