<template>
    <div class="memoria-container">
        <lightning-layout multiple-rows="true" vertical-align="stretch">
            
            <!-- COLUMNA 1: HALLAZGOS (3/12) -->
            <lightning-layout-item size="12" large-device-size="3" padding="around-small" class={hideSidebarsClass}>
                <div class="summary-card slds-p-around_small">
                    <div class="column-header">
                        <h2 class="title slds-m-bottom_small">1. Hallazgos</h2>
                    </div>
                    <div class="details-scroll">
                        <lightning-accordion allow-multiple-sections-open>
                            <template for:each={groupedDetails} for:item="group">
                                <lightning-accordion-section key={group.label} name={group.label} label={group.label}>
                                    <template for:each={group.records} for:item="rec">
                                        <div key={rec.id} class={rec.className} data-id={rec.id} onclick={handleRecordSelect}>
                                            <div class="slds-grid slds-grid_align-spread slds-m-bottom_x-small">
                                                <span class="record-name">{rec.name}</span>
                                                <div class="slds-grid slds-grid_vertical-align-center">
                                                    <span if:true={rec.estado} class={rec.estadoClass}>{rec.estado}</span>
                                                    <lightning-icon if:true={rec.hasSolutions} icon-name="utility:check" size="xx-small" variant="success" class="slds-m-left_x-small"></lightning-icon>
                                                </div>
                                            </div>
                                            
                                            <!-- Campos Base Estructurados -->
                                            <div class="mini-fields-grid slds-m-bottom_x-small">
                                                <template for:each={rec.fields} for:item="f">
                                                    <div key={f.label} class="field-item-pill">
                                                        <span class="pill-label">{f.label}:</span>
                                                        <span class="pill-value">{f.value}</span>
                                                    </div>
                                                </template>
                                            </div>

                                            <!-- Métricas como Tags -->
                                            <div if:true={rec.metrics.length} class="metrics-tags slds-m-bottom_x-small">
                                                <template for:each={rec.metrics} for:item="m">
                                                    <span key={m} class="metric-tag">{m}</span>
                                                </template>
                                            </div>

                                            <!-- Observaciones -->
                                            <div if:true={rec.observaciones} class="obs-box">
                                                <div class="obs-header">
                                                    <lightning-icon icon-name="utility:note" size="xx-small" class="slds-m-right_xxx-small"></lightning-icon>
                                                    <span>Observaciones Técnicas:</span>
                                                </div>
                                                <p class="obs-text">{rec.observaciones}</p>
                                            </div>
                                        </div>
                                    </template>
                                </lightning-accordion-section>
                            </template>
                        </lightning-accordion>
                    </div>
                </div>
            </lightning-layout-item>

            <!-- COLUMNA 2: SOLUCIONES (3/12) -->
            <lightning-layout-item size="12" large-device-size="3" padding="around-small" class={hideSidebarsClass}>
                <div class="summary-card slds-p-around_small">
                    <div class="column-header">
                        <div class="slds-grid slds-grid_align-spread slds-m-bottom_small">
                            <h2 class="title">2. Soluciones</h2>
                            <lightning-button-icon icon-name="utility:add" variant="border-filled" onclick={handleAddSol} disabled={isAddButtonDisabled}></lightning-button-icon>
                        </div>
                    </div>
                    
                    <template if:true={selectedRecordId}>
                        <div class="sol-list">
                            <template for:each={solutions} for:item="sol">
                                <div key={sol.Id} class={sol.className} data-id={sol.Id} onclick={handleSolSelect}>
                                    <div class="slds-grid slds-grid_align-spread">
                                        <span>{sol.Name}</span>
                                        <lightning-button-icon icon-name="utility:delete" size="xx-small" variant="bare" data-id={sol.Id} onclick={handleDeleteSol}></lightning-button-icon>
                                    </div>
                                </div>
                            </template>
                            <div if:false={solutions.length} class="slds-text-align_center slds-p-around_medium slds-text-color_weak">
                                No hay soluciones.
                            </div>
                        </div>
                    </template>
                    <div if:false={selectedRecordId} class="slds-text-align_center slds-p-around_medium">
                        Seleccione un hallazgo.
                    </div>
                </div>
            </lightning-layout-item>

            <!-- COLUMNA 3: EDITOR (6/12) -->
            <lightning-layout-item size="12" large-device-size={editorColumnSize} padding="around-small">
                <div class={editorContainerClass}>
                    <div class="editor-header slds-p-around_medium slds-grid slds-grid_align-spread">
                        <h2 class="title">{editorTitle}</h2>
                        <lightning-button-icon 
                            icon-name={fullScreenIcon} 
                            variant="border-filled" 
                            onclick={toggleFullScreen}
                            tooltip="Modo Pantalla Completa">
                        </lightning-button-icon>
                    </div>
                    
                    <div class="editor-content-area">
                        <template if:true={selectedSolucionId}>
                            <lightning-input-rich-text
                                value={memoriaText}
                                onchange={handleTextChange}
                                class="rich-editor">
                            </lightning-input-rich-text>
                        </template>
                        <template if:false={selectedSolucionId}>
                            <div class="empty-editor-state">
                                <lightning-icon icon-name="utility:edit" size="large"></lightning-icon>
                                <p>Seleccione o cree una solución para redactar.</p>
                            </div>
                        </template>
                    </div>

                    <div class="editor-footer slds-p-around_medium slds-text-align_right">
                        <lightning-button 
                            variant="brand" 
                            label="Guardar Solución" 
                            icon-name="utility:save"
                            onclick={handleSaveDescription}
                            disabled={isSaving}>
                        </lightning-button>
                    </div>
                </div>
            </lightning-layout-item>
        </lightning-layout>

        <!-- MODAL NUEVA SOLUCIÓN -->
        <template if:true={showSolModal}>
            <section role="dialog" class="slds-modal slds-fade-in-open">
                <div class="slds-modal__container">
                    <header class="slds-modal__header">
                        <h2 class="slds-text-heading_medium">Nueva Solución para {selectedRecordName}</h2>
                    </header>
                    <div class="slds-modal__content slds-p-around_medium">
                        <lightning-input label="Nombre de la Solución" value={newSolName} onchange={handleNewSolNameChange} placeholder="ej. Limpieza Profunda, Cambio de Sello..."></lightning-input>
                    </div>
                    <footer class="slds-modal__footer">
                        <lightning-button label="Cancelar" onclick={handleCloseModal} class="slds-m-right_x-small"></lightning-button>
                        <lightning-button label="Crear" variant="brand" onclick={handleConfirmAddSol}></lightning-button>
                    </footer>
                </div>
            </section>
            <div class="slds-backdrop slds-backdrop_open"></div>
        </template>
    </div>
</template>
