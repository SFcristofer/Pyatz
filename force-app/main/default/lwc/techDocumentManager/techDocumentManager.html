<template>
    <div class="premium-container slds-p-around_large">
        <template if:true={isLoading}>
            <lightning-spinner alternative-text="Procesando..." size="medium" variant="brand"></lightning-spinner>
        </template>

        <!-- HEADER CON PROGRESO -->
        <div class="header-section slds-m-bottom_x-large">
            <div class="slds-grid slds-grid_align-spread slds-grid_vertical-align-end slds-m-bottom_small">
                <div>
                    <h2 class="main-title">Expediente de Onboarding</h2>
                    <p class="sub-title">Carga de documentos legales y técnicos para alta de cliente</p>
                </div>
                <div class="progress-stats">
                    <span class="percentage">{completedPercentage}%</span>
                    <span class="count">{completedCount} de {totalCount}</span>
                </div>
            </div>
            <lightning-progress-bar value={completedPercentage} size="medium" variant="circular" class="custom-progress"></lightning-progress-bar>
        </div>
        
        <div class="slds-grid slds-wrap slds-gutters_large">
            <!-- Columna Izquierda -->
            <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                <template for:each={leftColumn} for:item="doc">
                    <div key={doc.key} class={doc.containerClass}>
                        <div class="doc-card-content slds-grid slds-grid_vertical-align-center">
                            <div class="status-icon-container slds-m-right_medium">
                                <lightning-icon 
                                    icon-name={doc.statusIcon} 
                                    size="small" 
                                    variant={doc.statusVariant}>
                                </lightning-icon>
                            </div>
                            <div class="slds-col slds-grow">
                                <span class="doc-label">{doc.label}</span>
                                <p class="doc-status-textText">{doc.statusText}</p>
                            </div>
                            <div class="actions-container slds-grid slds-grid_vertical-align-center">
                                <lightning-radio-group 
                                    name={doc.key}
                                    options={options}
                                    value={doc.value}
                                    type="button"
                                    variant="label-hidden"
                                    class="minimal-radio"
                                    disabled>
                                </lightning-radio-group>
                                <!-- CONTENEDOR DE SUBIDA MEJORADO -->
                                <div class="upload-wrapper slds-m-left_small">
                                    <lightning-icon 
                                        icon-name="utility:upload" 
                                        size="xx-small" 
                                        class="fake-icon-visual">
                                    </lightning-icon>
                                    <lightning-file-upload
                                        label=""
                                        name="fileUploader"
                                        accept=".pdf,.png,.jpg,.jpeg"
                                        record-id={recordId}
                                        onuploadfinished={handleUploadFinished}
                                        data-key={doc.key}
                                        class="real-uploader-overlay">
                                    </lightning-file-upload>
                                </div>
                            </div>
                        </div>
                    </div>
                </template>
            </div>

            <!-- Columna Derecha -->
            <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                <template for:each={rightColumn} for:item="doc">
                    <div key={doc.key} class={doc.containerClass}>
                        <div class="doc-card-content slds-grid slds-grid_vertical-align-center">
                            <div class="status-icon-container slds-m-right_medium">
                                <lightning-icon 
                                    icon-name={doc.statusIcon} 
                                    size="small" 
                                    variant={doc.statusVariant}>
                                </lightning-icon>
                            </div>
                            <div class="slds-col slds-grow">
                                <span class="doc-label">{doc.label}</span>
                                <p class="doc-status-textText">{doc.statusText}</p>
                            </div>
                            <div class="actions-container slds-grid slds-grid_vertical-align-center">
                                <lightning-radio-group 
                                    name={doc.key}
                                    options={options}
                                    value={doc.value}
                                    type="button"
                                    variant="label-hidden"
                                    class="minimal-radio"
                                    disabled>
                                </lightning-radio-group>
                                <!-- CONTENEDOR DE SUBIDA MEJORADO -->
                                <div class="upload-wrapper slds-m-left_small">
                                    <lightning-icon 
                                        icon-name="utility:upload" 
                                        size="xx-small" 
                                        class="fake-icon-visual">
                                    </lightning-icon>
                                    <lightning-file-upload
                                        label=""
                                        name="fileUploader"
                                        accept=".pdf,.png,.jpg,.jpeg"
                                        record-id={recordId}
                                        onuploadfinished={handleUploadFinished}
                                        data-key={doc.key}
                                        class="real-uploader-overlay">
                                    </lightning-file-upload>
                                </div>
                            </div>
                        </div>
                    </div>
                </template>
            </div>
        </div>
    </div>
</template>
