<template>
    <div class="premium-container slds-p-around_large">
        <template if:true={isLoading}>
            <lightning-spinner alternative-text="Procesando..." size="medium" variant="brand"></lightning-spinner>
        </template>

        <!-- HEADER -->
        <div class="header-section slds-m-bottom_x-large">
            <div class="slds-grid slds-grid_align-spread slds-grid_vertical-align-end slds-m-bottom_small">
                <div>
                    <h2 class="main-title">Expediente de Onboarding</h2>
                    <p class="sub-title">Gestión técnica y legal de documentos</p>
                </div>
                <div class="progress-stats">
                    <span class="percentage">{completedPercentage}%</span>
                    <span class="count">{completedCount} de {totalCount} completados</span>
                </div>
            </div>
            <lightning-progress-bar value={completedPercentage} size="medium" variant="circular" class="custom-progress"></lightning-progress-bar>
        </div>
        
        <div class="slds-grid slds-wrap slds-gutters_large">
            <!-- Columna Izquierda -->
            <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                <template for:each={leftColumn} for:item="doc">
                    <div key={doc.key} class={doc.containerClass}>
                        <div class="slds-grid slds-grid_vertical-align-center">
                            <div class="slds-m-right_small">
                                <lightning-icon 
                                    icon-name={doc.statusIcon} 
                                    size="small" 
                                    variant={doc.statusVariant}>
                                </lightning-icon>
                            </div>
                            <div class="slds-col slds-grow">
                                <span class="doc-label">{doc.label}</span>
                                <span class={doc.badgeClass}>{doc.statusLabel}</span>
                            </div>
                            <div class="actions slds-grid slds-grid_vertical-align-center">
                                <!-- Acciones para documentos cargados -->
                                <template if:true={doc.isCompleted}>
                                    <lightning-button-icon 
                                        icon-name="utility:preview" 
                                        variant="border-filled"
                                        onclick={handlePreview}
                                        data-id={doc.value}
                                        class="slds-m-right_xx-small"
                                        tooltip="Previsualizar">
                                    </lightning-button-icon>
                                    <lightning-button-icon 
                                        icon-name="utility:delete" 
                                        variant="border-filled"
                                        onclick={handleDelete}
                                        data-id={doc.value}
                                        data-label={doc.label}
                                        class="slds-m-right_x-small btn-delete"
                                        tooltip="Eliminar">
                                    </lightning-button-icon>
                                </template>
                                
                                <lightning-file-upload
                                    label=""
                                    name="fileUploader"
                                    accept=".pdf,.png,.jpg,.jpeg"
                                    record-id={recordId}
                                    onuploadfinished={handleUploadFinished}
                                    data-key={doc.key}
                                    class="upload-button-styled"
                                    variant="label-hidden">
                                </lightning-file-upload>
                            </div>
                        </div>
                    </div>
                </template>
            </div>

            <!-- Columna Derecha -->
            <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                <template for:each={rightColumn} for:item="doc">
                    <div key={doc.key} class={doc.containerClass}>
                        <div class="slds-grid slds-grid_vertical-align-center">
                            <div class="slds-m-right_small">
                                <lightning-icon 
                                    icon-name={doc.statusIcon} 
                                    size="small" 
                                    variant={doc.statusVariant}>
                                </lightning-icon>
                            </div>
                            <div class="slds-col slds-grow">
                                <span class="doc-label">{doc.label}</span>
                                <span class={doc.badgeClass}>{doc.statusLabel}</span>
                            </div>
                            <div class="actions slds-grid slds-grid_vertical-align-center">
                                <template if:true={doc.isCompleted}>
                                    <lightning-button-icon 
                                        icon-name="utility:preview" 
                                        variant="border-filled"
                                        onclick={handlePreview}
                                        data-id={doc.value}
                                        class="slds-m-right_xx-small"
                                        tooltip="Previsualizar">
                                    </lightning-button-icon>
                                    <lightning-button-icon 
                                        icon-name="utility:delete" 
                                        variant="border-filled"
                                        onclick={handleDelete}
                                        data-id={doc.value}
                                        data-label={doc.label}
                                        class="slds-m-right_x-small btn-delete"
                                        tooltip="Eliminar">
                                    </lightning-button-icon>
                                </template>

                                <lightning-file-upload
                                    label=""
                                    name="fileUploader"
                                    accept=".pdf,.png,.jpg,.jpeg"
                                    record-id={recordId}
                                    onuploadfinished={handleUploadFinished}
                                    data-key={doc.key}
                                    class="upload-button-styled"
                                    variant="label-hidden">
                                </lightning-file-upload>
                            </div>
                        </div>
                    </div>
                </template>
            </div>
        </div>
    </div>
</template>
