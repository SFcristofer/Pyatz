                            <lightning-icon icon-name="standard:contract" size="small" class="slds-m-right_small"></lightning-icon>
                            <h2 class="slds-text-heading_medium">Configurador de Contrato</h2>
                        </div>
                        <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse"
                                title="Cerrar" onclick={handleCloseContractModal}>
                            <lightning-icon icon-name="utility:close" size="small" variant="inverse"></lightning-icon>
                        </button>
                    </header>
                    <div class="slds-modal__content">
                        <template if:true={isResolvingOpp}>
                            <div class="slds-is-relative" style="height: 200px;">
                                <lightning-spinner alternative-text="Cargando..." size="medium"></lightning-spinner>
                            </div>
                        </template>
                        <template if:true={contractModalOppId}>
                            <c-tech-work-order-console
                                record-id={contractModalOppId}
                                quote-id={contractModalQuoteId}
                                service-contract-id={contractModalScId}
                                onback={handleCloseContractModal}>
                            </c-tech-work-order-console>
                        </template>
                    </div>
                </div>
            </section>
            <div class="slds-backdrop slds-backdrop_open"></div>
        </template>

        <!-- MODAL: EDICIÓN MASIVA -->
        <template if:true={showBulkEditModal}>
            <section role="dialog" tabindex="-1" aria-modal="true" class="slds-modal slds-fade-in-open slds-modal_medium">
                <div class="slds-modal__container">
                    <header class="slds-modal__header slds-grid slds-grid_vertical-align-center slds-grid_align-spread">
                        <div class="slds-grid slds-grid_vertical-align-center">
                            <lightning-icon icon-name="utility:edit" size="small" class="slds-m-right_small"></lightning-icon>
                            <h2 class="slds-text-heading_medium">Editar en masa — {selectedCount} ODT</h2>
                        </div>
                        <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse"
                                title="Cerrar" onclick={handleCloseBulkEdit}>
                            <lightning-icon icon-name="utility:close" size="small" variant="inverse"></lightning-icon>
                        </button>
                    </header>

                    <div class="slds-modal__content slds-p-around_medium">
                        <p class="bulk-hint slds-m-bottom_medium">
                            <lightning-icon icon-name="utility:info" size="x-small" class="slds-m-right_x-small"></lightning-icon>
                            Solo se actualizarán los campos que modifiques. Los campos vacíos no se tocarán.
                        </p>

                        <div class="slds-grid slds-wrap slds-gutters">
                            <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-p-bottom_small">
                                <div class="slds-form-element">
                                    <label class="slds-form-element__label">Estado</label>
                                    <div class="slds-form-element__control">
                                        <select class="slds-select" data-field="status" onchange={handleBulkFieldChange}>
                                            <option value="">— Sin cambio —</option>
                                            <option value="New">Pendiente Ejecución</option>
                                            <option value="Scheduled">Programada</option>
                                            <option value="Dispatched">Enviada</option>
                                            <option value="In Progress">En Ejecución</option>
                                            <option value="On Site">En Sitio</option>
                                            <option value="Completed">Verificada</option>
                                            <option value="Cannot Complete">No Completada</option>
                                            <option value="Closed">Cerrada</option>
                                        </select>
                                    </div>
                                </div>
                            </div>

                            <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-p-bottom_small">
                                <div class="slds-form-element">
                                    <label class="slds-form-element__label">Prioridad</label>
                                    <div class="slds-form-element__control">
                                        <select class="slds-select" data-field="priority" onchange={handleBulkFieldChange}>
                                            <option value="">— Sin cambio —</option>
                                            <option value="Low">Baja</option>
                                            <option value="Medium">Media</option>
                                            <option value="High">Alta</option>
                                            <option value="Critical">Crítica</option>
                                        </select>
                                    </div>
                                </div>
                            </div>

                            <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-p-bottom_small">
                                <div class="slds-form-element">
                                    <label class="slds-form-element__label">Fecha de inicio</label>
                                    <div class="slds-form-element__control">
                                        <input type="date" class="slds-input" data-field="startDate" onchange={handleBulkFieldChange} />
                                    </div>
                                </div>
                            </div>

                            <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-p-bottom_small">
                                <div class="slds-form-element">
                                    <label class="slds-form-element__label">Contrato de Servicio</label>
                                    <div class="slds-form-element__control">
                                        <template if:true={isLoadingContracts}>
                                            <lightning-spinner size="small" alternative-text="Cargando..."></lightning-spinner>
                                        </template>
                                        <template if:false={isLoadingContracts}>
                                            <select class="slds-select" data-field="contractId" onchange={handleBulkFieldChange}>
                                                <option value="">— Sin cambio —</option>
                                                <template for:each={availableContracts} for:item="sc">
                                                    <option key={sc.id} value={sc.id}>{sc.label}</option>
                                                </template>
                                            </select>
                                        </template>
                                    </div>
                                </div>
                            </div>

                            <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-p-bottom_small">
                                <div class="slds-form-element">
                                    <label class="slds-form-element__label">Territorio de Servicio</label>
                                    <div class="slds-form-element__control">
                                        <template if:true={isLoadingTerritories}>
                                            <lightning-spinner size="small" alternative-text="Cargando..."></lightning-spinner>
                                        </template>
                                        <template if:false={isLoadingTerritories}>
                                            <select class="slds-select" data-field="territoryId" onchange={handleBulkFieldChange}>
                                                <option value="">— Sin cambio —</option>
                                                <template for:each={availableTerritories} for:item="st">
                                                    <option key={st.id} value={st.id}>{st.label}</option>
                                                </template>
                                            </select>
                                        </template>
                                    </div>
                                </div>
                            </div>

                            <div class="slds-col slds-size_1-of-1 slds-p-bottom_small">
                                <div class="slds-form-element">
                                    <label class="slds-form-element__label">Descripción / Notas</label>
                                    <div class="slds-form-element__control">
                                        <textarea class="slds-textarea" rows="3"
                                            placeholder="Dejar vacío para no modificar..."
                                            data-field="description"
                                            onchange={handleBulkFieldChange}>
                                        </textarea>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <footer class="slds-modal__footer">
                        <lightning-button label="Cancelar" onclick={handleCloseBulkEdit} class="slds-m-right_small"></lightning-button>
                        <lightning-button
                            label="Guardar cambios"
                            variant="brand"
                            icon-name="utility:save"
                            disabled={isSavingBulk}
                            onclick={handleConfirmBulkEdit}>
                        </lightning-button>
                    </footer>
                </div>
            </section>
            <div class="slds-backdrop slds-backdrop_open"></div>
        </template>

        <!-- MODAL: FUSIONAR CITAS DE SERVICIO -->
        <template if:true={showFusionWizard}>
            <c-tech-fusion-wizard
                contract-id={fusionContractId}
                contract-name={fusionContractName}
                onfusioncomplete={handleFusionComplete}
                onclose={handleCloseFusionWizard}>
            </c-tech-fusion-wizard>
        </template>

        <!-- MODAL: ASIGNAR A CONTRATO -->
        <template if:true={showAssignModal}>
            <section role="dialog" tabindex="-1" aria-modal="true" class="slds-modal slds-fade-in-open">
                <div class="slds-modal__container">
                    <header class="slds-modal__header slds-grid slds-grid_vertical-align-center slds-grid_align-spread">
                        <div class="slds-grid slds-grid_vertical-align-center">
                            <lightning-icon icon-name="standard:contract" size="small" class="slds-m-right_small"></lightning-icon>
                            <h2 class="slds-text-heading_medium">Asignar ODTs a Contrato</h2>
                        </div>
                        <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse"
                                title="Cerrar" onclick={handleCloseAssignModal}>
                            <lightning-icon icon-name="utility:close" size="small" variant="inverse"></lightning-icon>
                        </button>
                    </header>

                    <div class="slds-modal__content slds-p-around_medium">
                        <p class="slds-m-bottom_medium assign-info">
                            <lightning-icon icon-name="utility:info" size="x-small" class="slds-m-right_x-small"></lightning-icon>
                            {pendingAssignCount} ODT seleccionadas se vincularán al contrato elegido.
                        </p>
                        <div class="slds-form-element">
                            <label class="slds-form-element__label">
                                <abbr class="slds-required" title="Requerido">*</abbr>
                                Selecciona el Contrato de Servicio
                            </label>
                            <div class="slds-form-element__control">
                                <template if:true={isLoadingContracts}>
                                    <lightning-spinner size="small" alternative-text="Cargando contratos..."></lightning-spinner>
                                </template>
                                <template if:false={isLoadingContracts}>
                                    <select class="slds-select" onchange={handleContractSelect}>
                                        <option value="">— Seleccionar contrato —</option>
                                        <template for:each={availableContracts} for:item="sc">
                                            <option key={sc.id} value={sc.id}>{sc.label}</option>
                                        </template>
                                    </select>
                                </template>
                            </div>
                        </div>
                    </div>

                    <footer class="slds-modal__footer">
                        <lightning-button label="Cancelar" onclick={handleCloseAssignModal} class="slds-m-right_small"></lightning-button>
                        <lightning-button
                            label="Asignar"
                            variant="brand"
                            icon-name="utility:link"
                            disabled={isAssigning}
                            onclick={handleConfirmAssign}>
                        </lightning-button>
                    </footer>
                </div>
            </section>
            <div class="slds-backdrop slds-backdrop_open"></div>
        </template>

        <!-- Modal Subir Foto Manual -->
        <template if:true={isUploadModalOpen}>
            <section role="dialog" tabindex="-1" class="slds-modal slds-fade-in-open">
                <div class="slds-modal__container" style="max-width: 400px; width: 400px;">
                    <header class="slds-modal__header">
                        <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse" title="Cerrar" onclick={handleCloseUploadModal}>
                            <lightning-icon icon-name="utility:close" alternative-text="Cerrar" size="small" variant="inverse"></lightning-icon>
                            <span class="slds-assistive-text">Cerrar</span>
                        </button>
                        <h2 class="slds-text-heading_medium slds-hyphenate">Subir Foto Manual</h2>
                    </header>
                    <div class="slds-modal__content slds-p-around_medium" style="min-height: 150px; text-align: center;">
                        <lightning-file-upload
                            label="Adjuntar Fotos"
                            name="fileUploader"
                            accept={acceptedPhotoFormats}
                            record-id={uploadRevId}
                            onuploadfinished={handleUploadFinished}
                            multiple>
                        </lightning-file-upload>
                    </div>
                    <footer class="slds-modal__footer">
                        <lightning-button label="Cerrar" onclick={handleCloseUploadModal}></lightning-button>
                    </footer>
                </div>
            </section>
            <div class="slds-backdrop slds-backdrop_open"></div>
        </template>

        <!-- Modal PDF Global -->
        <template if:true={showPdfModal}>
            <section role="dialog" tabindex="-1" class="slds-modal slds-fade-in-open slds-modal_large">
                <div class="slds-modal__container">
                    <header class="slds-modal__header">
                        <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse"
                            onclick={handleClosePdfModal}>
                            <lightning-icon icon-name="utility:close" size="small"></lightning-icon>
                        </button>
                        <h2 class="slds-modal__title">{pdfModalTitle}</h2>
                    </header>
                    <div class="slds-modal__content modal-body">
                        <iframe src={pdfModalUrl} class="pdf-iframe" title="PDF Global"></iframe>
                    </div>
                </div>
            </section>
            <div class="slds-backdrop slds-backdrop_open"></div>
        </template>
    </div>
</template>
