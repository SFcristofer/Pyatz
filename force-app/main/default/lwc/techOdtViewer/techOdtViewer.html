<template>
    <div class="odt-wrapper">

        <!-- TOOLBAR SUPERIOR -->
        <div class="odt-toolbar">
            <div class="toolbar-left">
                <lightning-icon icon-name="standard:work_order" size="small" class="slds-m-right_small"></lightning-icon>
                <h1 class="odt-title">
                    <!-- En realidad son Órdenes de Trabajo, pero se nombra Número de visitas porque el cliente se confunde al estar acostumbrado a otra integración -->
                    Número de visitas
                </h1>
                <span class="total-badge slds-m-left_small">{totalWorkOrders} ODT</span>
                <template if:true={hasSelected}>
                    <span class="selected-badge slds-m-left_small">{selectedCount} seleccionadas</span>
                </template>
            </div>
            <div class="toolbar-right">
                <label class="filter-toggle slds-m-right_medium">
                    <input type="checkbox" checked={showWithOdts} onchange={handleToggleWithOdts} />
                    <span>Con ODT</span>
                </label>
                <label class="filter-toggle">
                    <input type="checkbox" checked={showWithoutOdts} onchange={handleToggleWithoutOdts} />
                    <span>Sin ODT</span>
                </label>
            </div>
        </div>

        <!-- BARRA DE ACCIONES MASIVAS -->
        <template if:true={hasSelected}>
            <div class="bulk-bar">
                <div class="bulk-bar-left">
                    <lightning-icon icon-name="utility:check" size="x-small" class="slds-m-right_x-small"></lightning-icon>
                    <strong>{selectedCount}</strong>&nbsp;ODT seleccionadas
                </div>
                <div class="bulk-bar-right">
                    <lightning-button
                        label="Editar en masa"
                        variant="brand"
                        icon-name="utility:edit"
                        class="slds-m-right_small"
                        onclick={handleOpenBulkEdit}>
                    </lightning-button>
                    <lightning-button
                        label="Asignar a contrato"
                        variant="brand-outline"
                        icon-name="utility:contract"
                        class="slds-m-right_small"
                        onclick={handleOpenAssignFromBulk}>
                    </lightning-button>
                    <lightning-button-icon
                        icon-name="utility:close"
                        variant="border-filled"
                        alternative-text="Limpiar selección"
                        title="Limpiar selección"
                        onclick={handleClearSelection}>
                    </lightning-button-icon>
                </div>
            </div>
        </template>

        <!-- BARRA DE FILTROS -->
        <div class="filter-bar">
            <div class="filter-group">
                <label class="filter-label">Contrato</label>
                <select class="filter-select" onchange={handleContractFilter}>
                    <option value="">Todos</option>
                    <template for:each={contractOptions} for:item="opt">
                        <option key={opt.value} value={opt.value}>{opt.label}</option>
                    </template>
                </select>
            </div>
            <div class="filter-group">
                <label class="filter-label">Fecha desde</label>
                <input type="date" class="filter-input" value={filterDateFrom} onchange={handleDateFromChange} />
            </div>
            <div class="filter-group">
                <label class="filter-label">Fecha hasta</label>
                <input type="date" class="filter-input" value={filterDateTo} onchange={handleDateToChange} />
            </div>
            <div class="filter-group">
                <label class="filter-label">Estado</label>
                <select class="filter-select" onchange={handleStatusFilter}>
                    <option value="">Todos</option>
                    <option value="pending">Pendientes</option>
                    <option value="completed">Verificadas</option>
                </select>
            </div>
            <button class="clear-btn" onclick={handleClearFilters} title="Limpiar filtros">
                <lightning-icon icon-name="utility:clear" size="x-small"></lightning-icon>
                Limpiar
            </button>
            <button class="refresh-btn" onclick={handleRefresh} disabled={isRefreshing} title="Actualizar datos">
                <template if:true={isRefreshing}>
                    <lightning-spinner size="x-small" alternative-text="Actualizando..."></lightning-spinner>
                </template>
                <template if:false={isRefreshing}>
                    <lightning-icon icon-name="utility:refresh" size="x-small"></lightning-icon>
                </template>
                Actualizar
            </button>
        </div>

        <!-- LOADING -->
        <template if:true={isLoading}>
            <div class="slds-is-relative odt-spinner-wrap">
                <lightning-spinner alternative-text="Cargando..." size="medium"></lightning-spinner>
            </div>
        </template>

        <!-- ERROR -->
        <template if:true={hasError}>
            <div class="slds-notify slds-notify_alert slds-theme_error slds-m-around_medium">
                Error cargando órdenes de trabajo.
            </div>
        </template>

        <!-- GRUPOS POR CONTRATO -->
        <template if:false={isLoading}>
            <template for:each={visibleGroups} for:item="group">
                <div key={group.id} class="contract-group">

                    <!-- CABECERA -->
                    <div class="contract-header slds-grid slds-grid_vertical-align-center slds-grid_align-spread"
                         data-id={group.id} onclick={handleToggleGroup}>
                        <div class="slds-grid slds-grid_vertical-align-center">
                            <lightning-button-icon icon-name={group.chevronIcon} variant="bare"
                                alternative-text="Colapsar" class="chevron-btn slds-m-right_x-small">
                            </lightning-button-icon>
                            <lightning-icon icon-name="standard:contract" size="x-small" class="slds-m-right_small"></lightning-icon>
                            <span class="contract-title">{group.displayName}</span>
                            <span class={group.statusClass}>{group.status}</span>
                        </div>
                        <div class="slds-grid slds-grid_vertical-align-center">
                            <span class="contract-meta slds-m-right_medium">{group.startDate} — {group.endDate}</span>
                            <span class="odt-count-badge slds-m-right_small">{group.filteredCount} ODT</span>
                            <template if:true={group.hasContractId}>
                                <lightning-button
                                    label="Fusionar Citas"
                                    icon-name="utility:merge"
                                    variant="neutral"
                                    size="small"
                                    data-contract-id={group.id}
                                    data-contract-name={group.displayName}
                                    onclick={handleOpenFusionWizard}>
                                </lightning-button>
                            </template>
                        </div>
                    </div>

                    <!-- CONTENIDO -->
                    <template if:true={group.expanded}>
                        <div class="odt-table-wrap">

                            <!-- Indicador de selección (sin botón Reorganizar) -->
                            <template if:true={group.hasSelected}>
                                <div class="sede-actions">
                                    <span class="group-selected-label">
                                        <lightning-icon icon-name="utility:check" size="xx-small" class="slds-m-right_xx-small"></lightning-icon>
                                        {group.selectedCount} seleccionadas en este contrato
                                    </span>
                                </div>
                            </template>

                            <template if:true={group.hasFilteredWorkOrders}>
                                <table class="odt-table">
                                    <thead>
                                        <tr>
                                            <th class="col-expand"></th>
                                            <th class="col-check">
                                                <input type="checkbox"
                                                    data-group-id={group.id}
                                                    onchange={handleSelectAllInGroup} />
                                            </th>
                                            <th class="col-num">Núm.</th>
                                            <th class="col-fecha">Fecha</th>
                                            <th class="col-estado">Estado</th>
                                            <th class="col-tecnico">Ejecución</th>
                                            <th class="col-territorio">Municipio</th>
                                            <th class="col-tipo">Tipo de OdT</th>
                                            <th class="col-tratamientos">Tratamientos</th>
                                            <th class="col-acciones"></th>
                                        </tr>
                                    </thead>
                                    <template for:each={group.filteredWorkOrders} for:item="wo">
                                        <tbody key={wo.id}>

                                                <!-- FILA PRINCIPAL ODT -->
                                                <tr class={wo.rowClass}>
                                                    <!-- Expand SA accordion -->
                                                    <td class="col-expand">
                                                        <template if:true={wo.hasAppointments}>
                                                            <lightning-button-icon
                                                                icon-name={wo.saChevronIcon}
                                                                variant="bare"
                                                                size="x-small"
                                                                alternative-text="Ver ODT"
                                                                title="Ver ODT"
                                                                data-id={wo.id}
                                                                onclick={handleToggleRowExpand}>
                                                            </lightning-button-icon>
                                                        </template>
                                                    </td>

                                                    <!-- Checkbox -->
                                                    <td class="col-check">
                                                        <input type="checkbox"
                                                            checked={wo.selected}
                                                            data-id={wo.id}
                                                            onchange={handleSelectRow} />
                                                    </td>

                                                    <!-- Número -->
                                                    <td class="col-num">
                                                        <a class="wo-number-link" href={wo.woUrl} target="_blank" title="Abrir ODT">{wo.number}</a>
                                                    </td>

                                                    <!-- Fecha (editable) -->
                                                    <td class="col-fecha">
                                                        <template if:true={wo.isEditing}>
                                                            <input type="date" class="inline-input"
                                                                value={wo.editStartDate}
                                                                data-id={wo.id}
                                                                data-field="startDate"
                                                                onchange={handleInlineFieldChange} />
                                                        </template>
                                                        <template if:false={wo.isEditing}>
                                                            {wo.fecha}
                                                        </template>
                                                    </td>

                                                    <!-- Estado (editable) -->
                                                    <td class="col-estado">
                                                        <template if:true={wo.isEditing}>
                                                            <lightning-combobox
                                                                label="Estado"
                                                                variant="label-hidden"
                                                                value={wo.editStatusValue}
                                                                options={statusOptions}
                                                                class="inline-combobox"
                                                                data-id={wo.id}
                                                                data-field="status"
                                                                onchange={handleInlineFieldChange}>
                                                            </lightning-combobox>
                                                        </template>
                                                        <template if:false={wo.isEditing}>
                                                            <span class={wo.statusClass}>{wo.status}</span>
                                                        </template>
                                                    </td>

                                                    <!-- Técnico -->
                                                    <td class="col-tecnico">
                                                        <template if:true={wo.technician}>
                                                            <div class="tech-cell">
                                                                <lightning-icon icon-name="utility:user" size="xx-small" class="slds-m-right_xx-small tech-icon"></lightning-icon>
                                                                {wo.technician}
                                                            </div>
                                                        </template>
                                                        <template if:false={wo.technician}>
                                                            <span class="no-assign">Sin asignar</span>
                                                        </template>
                                                    </td>

                                                    <td class="col-territorio">
                                                        <template if:true={wo.isEditing}>
                                                            <lightning-combobox
                                                                label="Territorio"
                                                                variant="label-hidden"
                                                                value={wo.editTerritoryId}
                                                                options={territoryOptions}
                                                                class="inline-combobox"
                                                                data-id={wo.id}
                                                                data-field="territoryId"
                                                                onchange={handleInlineFieldChange}>
                                                            </lightning-combobox>
                                                        </template>
                                                        <template if:false={wo.isEditing}>
                                                            {wo.territory}
                                                        </template>
                                                    </td>
                                                    <td class="col-tipo"><span class="tipo-tag">{wo.tipo}</span></td>
                                                    <td class="col-tratamientos"><span class="treatments-text">{wo.treatments}</span></td>

                                                    <!-- Acciones -->
                                                    <td class="col-acciones">
                                                        <template if:true={wo.isEditing}>
                                                            <div class="action-group">
                                                                <lightning-button-icon
                                                                    icon-name="utility:save"
                                                                    variant="brand"
                                                                    size="x-small"
                                                                    alternative-text="Guardar"
                                                                    title="Guardar"
                                                                    disabled={isSavingInline}
                                                                    data-id={wo.id}
                                                                    onclick={handleSaveInlineEdit}>
                                                                </lightning-button-icon>
                                                                <lightning-button-icon
                                                                    icon-name="utility:close"
                                                                    variant="border-filled"
                                                                    size="x-small"
                                                                    alternative-text="Cancelar"
                                                                    title="Cancelar"
                                                                    onclick={handleCancelInlineEdit}>
                                                                </lightning-button-icon>
                                                            </div>
                                                        </template>
                                                        <template if:false={wo.isEditing}>
                                                            <div class="action-group">
                                                                <lightning-button-icon
                                                                    icon-name="utility:edit"
                                                                    variant="border-filled"
                                                                    size="x-small"
                                                                    alternative-text="Editar"
                                                                    title="Editar estado/fecha"
                                                                    data-id={wo.id}
                                                                    onclick={handleOpenInlineEdit}>
                                                                </lightning-button-icon>
                                                                <lightning-button-icon
                                                                    icon-name="utility:preview"
                                                                    variant="border-filled"
                                                                    size="x-small"
                                                                    alternative-text="Ver ODT"
                                                                    title="Ver ODT"
                                                                    data-id={wo.id}
                                                                    onclick={handleViewWorkOrder}>
                                                                </lightning-button-icon>
                                                                <lightning-button-icon
                                                                    icon-name="utility:pdf_ext"
                                                                    variant="border-filled"
                                                                    size="x-small"
                                                                    alternative-text="PDF Global"
                                                                    title="PDF Consolidado de esta ODT"
                                                                    data-id={wo.id}
                                                                    onclick={handleGlobalPDF}>
                                                                </lightning-button-icon>
                                                            </div>
                                                        </template>
                                                    </td>
                                                </tr>

                                                <!-- FILA ACORDEÓN: CITAS DE SERVICIO -->
                                                <template if:true={wo.rowExpanded}>
                                                    <tr class="sa-accordion-row">
                                                        <td colspan="10">
                                                            <div class="sa-accordion-content">
                                                                <div class="sa-accordion-header">
                                                                    <lightning-icon icon-name="standard:service_appointment" size="x-small" class="slds-m-right_x-small"></lightning-icon>
                                                                    <!-- En realidad son Citas de Servicio (Service Appointments), pero se muestra como ODT a peticin del cliente -->
                                                                    ODT
                                                                </div>
                                                                <table class="sa-table">
                                                                    <thead>
                                                                        <tr>
                                                                            <th class="col-sa-expand"></th>
                                                                            <th>Núm.</th>
                                                                            <th>Fecha programada</th>
                                                                            <th>Estado</th>
                                                                            <th>Técnico</th>
                                                                            <th class="col-sa-tratamiento">Tratamiento</th>
                                                                            <th>Rev./Tipos</th>
                                                                            <th>Duración</th>
                                                                            <th>Notas</th>
                                                                            <th class="col-sa-actions"></th>
                                                                        </tr>
                                                                    </thead>
                                                                    <template for:each={wo.appointments} for:item="sa">
                                                                        <tbody key={sa.id}>
                                                                            <tr class="sa-row">
                                                                                <td class="col-sa-expand">
                                                                                    <template if:true={sa.hasRevisiones}>
                                                                                        <lightning-button-icon
                                                                                            icon-name={sa.revChevronIcon}
                                                                                            variant="bare"
                                                                                            size="x-small"
                                                                                            alternative-text="Revisiones"
                                                                                            title="Ver revisiones"
                                                                                            data-sa-id={sa.id}
                                                                                            onclick={handleToggleSaRevExpand}>
                                                                                        </lightning-button-icon>
                                                                                    </template>
                                                                                </td>
                                                                                <td class="sa-num">
                                                                    <a class="sa-num-link" href={sa.saUrl} target="_blank" title="Abrir Cita de Servicio">{sa.number}</a>
                                                                </td>
                                                                                <td>
                                                                                    <template if:true={sa.isEditingDate}>
                                                                                        <div class="sa-date-edit-wrap">
                                                                                            <input type="datetime-local"
                                                                                                class="sa-date-input"
                                                                                                value={sa.editDateValue}
                                                                                                data-sa-id={sa.id}
                                                                                                onchange={handleSaDateChange} />
                                                                                            <lightning-button-icon
                                                                                                icon-name="utility:save"
                                                                                                variant="brand"
                                                                                                size="x-small"
                                                                                                alternative-text="Guardar"
                                                                                                title="Guardar"
                                                                                                data-sa-id={sa.id}
                                                                                                onclick={handleSaveSaDate}>
                                                                                            </lightning-button-icon>
                                                                                            <lightning-button-icon
                                                                                                icon-name="utility:close"
                                                                                                variant="bare"
                                                                                                size="x-small"
                                                                                                alternative-text="Cancelar"
                                                                                                title="Cancelar"
                                                                                                onclick={handleCancelSaDate}>
                                                                                            </lightning-button-icon>
                                                                                        </div>
                                                                                    </template>
                                                                                    <template if:false={sa.isEditingDate}>
                                                                                        <div class="sa-date-display"
                                                                                             data-sa-id={sa.id}
                                                                                             onclick={handleEditSaDate}
                                                                                             title="Clic para editar fecha">
                                                                                            {sa.schedDate}
                                                                                            <lightning-icon icon-name="utility:edit" size="xx-small" class="sa-date-edit-icon"></lightning-icon>
                                                                                        </div>
                                                                                    </template>
                                                                                </td>
                                                                                <td>
                                                                                    <template if:true={sa.isEditingStatus}>
                                                                                        <div class="sa-date-edit-wrap">
                                                                                            <lightning-combobox
                                                                                                label="Estado"
                                                                                                variant="label-hidden"
                                                                                                value={sa.editSaStatusValue}
                                                                                                options={saStatusOptions}
                                                                                                class="sa-status-combobox"
                                                                                                data-sa-id={sa.id}
                                                                                                onchange={handleSaStatusChange}>
                                                                                            </lightning-combobox>
                                                                                            <lightning-button-icon icon-name="utility:save" variant="brand" size="x-small" alternative-text="Guardar" title="Guardar" disabled={isSavingSaStatus} data-sa-id={sa.id} onclick={handleSaveSaStatus}></lightning-button-icon>
                                                                                            <lightning-button-icon icon-name="utility:close" variant="bare" size="x-small" alternative-text="Cancelar" title="Cancelar" onclick={handleCancelSaStatus}></lightning-button-icon>
                                                                                        </div>
                                                                                    </template>
                                                                                    <template if:false={sa.isEditingStatus}>
                                                                                        <div class="sa-detail-display" data-sa-id={sa.id} onclick={handleEditSaStatus} title="Clic para editar">
                                                                                            <span class="sa-status-tag">{sa.status}</span>
                                                                                            <lightning-icon icon-name="utility:edit" size="xx-small" class="sa-detail-edit-icon"></lightning-icon>
                                                                                        </div>
                                                                                    </template>
                                                                                </td>
                                                                                <td class="sa-tech-cell">
                                                                                    <div class="sa-tech-multi-wrap">
                                                                                        <template for:each={sa.technicians} for:item="tech">
                                                                                            <span key={tech.arId} class="tech-pill">
                                                                                                <lightning-icon icon-name="utility:user" size="xx-small" class="tech-pill-icon"></lightning-icon>
                                                                                                {tech.name}
                                                                                                <button class="tech-remove-btn" data-ar-id={tech.arId} onclick={handleRemoveTech} title="Remover">×</button>
                                                                                            </span>
                                                                                        </template>
                                                                                        <template if:false={sa.hasTechnicians}>
                                                                                            <template if:false={sa.isAddingTech}>
                                                                                                <span class="no-assign">Sin asignar</span>
                                                                                            </template>
                                                                                        </template>
                                                                                        <template if:true={sa.isAddingTech}>
                                                                                            <div class="add-tech-inline">
                                                                                                <lightning-combobox
                                                                                                    label="Técnico"
                                                                                                    variant="label-hidden"
                                                                                                    value={sa.newTechVal}
                                                                                                    options={saResourceOptions}
                                                                                                    placeholder="Seleccionar..."
                                                                                                    class="sa-tech-combobox"
                                                                                                    data-sa-id={sa.id}
                                                                                                    onchange={handleNewTechChange}>
                                                                                                </lightning-combobox>
                                                                                                <lightning-button-icon icon-name="utility:check" variant="brand" size="x-small" alternative-text="Confirmar" title="Confirmar" disabled={isSavingAddTech} data-sa-id={sa.id} onclick={handleConfirmAddTech}></lightning-button-icon>
                                                                                                <lightning-button-icon icon-name="utility:close" variant="bare" size="x-small" alternative-text="Cancelar" title="Cancelar" onclick={handleCancelAddTech}></lightning-button-icon>
                                                                                            </div>
                                                                                        </template>
                                                                                        <template if:false={sa.isAddingTech}>
                                                                                            <button class="add-tech-btn" data-sa-id={sa.id} onclick={handleShowAddTech} title="Agregar técnico">+ Técnico</button>
                                                                                        </template>
                                                                                    </div>
                                                                                </td>
                                                                                <!-- Tratamiento inline -->
                                                                                <td class="col-sa-tratamiento">
                                                                                    <template if:true={sa.isEditingProducto}>
                                                                                        <div class="sa-date-edit-wrap">
                                                                                            <template if:true={sa.loadingProductos}>
                                                                                                <lightning-spinner size="x-small" alternative-text="Cargando..."></lightning-spinner>
                                                                                            </template>
                                                                                            <template if:false={sa.loadingProductos}>
                                                                                                <lightning-combobox
                                                                                                    label="Tratamiento"
                                                                                                    variant="label-hidden"
                                                                                                    value={sa.editProductoValue}
                                                                                                    options={sa.productoOptions}
                                                                                                    class="sa-status-combobox"
                                                                                                    data-sa-id={sa.id}
                                                                                                    onchange={handleSaProductoChange}>
                                                                                                </lightning-combobox>
                                                                                            </template>
                                                                                            <lightning-button-icon icon-name="utility:save" variant="brand" size="x-small" alternative-text="Guardar" title="Guardar" disabled={isSavingSaProducto} data-sa-id={sa.id} onclick={handleSaveSaProducto}></lightning-button-icon>
                                                                                            <lightning-button-icon icon-name="utility:close" variant="bare" size="x-small" alternative-text="Cancelar" title="Cancelar" onclick={handleCancelSaProducto}></lightning-button-icon>
                                                                                        </div>
                                                                                    </template>
                                                                                    <template if:false={sa.isEditingProducto}>
                                                                                        <div class="sa-detail-display" data-sa-id={sa.id} data-contract-id={sa.contractId} onclick={handleEditSaProducto} title="Clic para editar tratamiento">
                                                                                            <span class="sa-tratamiento-label">{sa.productoLabel}</span>
                                                                                            <lightning-icon icon-name="utility:edit" size="xx-small" class="sa-detail-edit-icon"></lightning-icon>
                                                                                        </div>
                                                                                    </template>
                                                                                </td>
                                                                                <td class="sa-rev-tipos-cell">
                                                                                    <span class="sa-rev-count">{sa.revCount}</span>
                                                                                    <span class="sa-rev-sep"> / </span>
                                                                                    <span class="sa-tipos-count">{sa.tiposCount}</span>
                                                                                </td>
                                                                                <td>
                                                                                    <template if:true={sa.isEditingDetails}>
                                                                                        <input type="number" min="0" class="sa-detail-input"
                                                                                            value={sa.editDuration}
                                                                                            data-sa-id={sa.id}
                                                                                            data-field="duration"
                                                                                            onchange={handleSaDetailsChange} />
                                                                                    </template>
                                                                                    <template if:false={sa.isEditingDetails}>
                                                                                        <div class="sa-detail-display"
                                                                                             data-sa-id={sa.id}
                                                                                             onclick={handleEditSaDetails}
                                                                                             title="Clic para editar">
                                                                                            {sa.duration}
                                                                                            <lightning-icon icon-name="utility:edit" size="xx-small" class="sa-detail-edit-icon"></lightning-icon>
                                                                                        </div>
                                                                                    </template>
                                                                                </td>
                                                                                <td class="sa-notes">
                                                                                    <template if:true={sa.isEditingDetails}>
                                                                                        <input type="text" class="sa-detail-input sa-detail-notes-input"
                                                                                            value={sa.editNotes}
                                                                                            data-sa-id={sa.id}
                                                                                            data-field="notes"
                                                                                            onchange={handleSaDetailsChange} />
                                                                                    </template>
                                                                                    <template if:false={sa.isEditingDetails}>
                                                                                        <div class="sa-detail-display"
                                                                                             data-sa-id={sa.id}
                                                                                             onclick={handleEditSaDetails}
                                                                                             title="Clic para editar">
                                                                                            {sa.notes}
                                                                                            <lightning-icon icon-name="utility:edit" size="xx-small" class="sa-detail-edit-icon"></lightning-icon>
                                                                                        </div>
                                                                                    </template>
                                                                                </td>
                                                                                <td class="sa-actions-cell">
                                                                                    <template if:true={sa.isEditingDetails}>
                                                                                        <div class="sa-actions-wrap">
                                                                                            <lightning-button-icon
                                                                                                icon-name="utility:save"
                                                                                                variant="brand"
                                                                                                size="x-small"
                                                                                                alternative-text="Guardar"
                                                                                                title="Guardar"
                                                                                                data-sa-id={sa.id}
                                                                                                onclick={handleSaveSaDetails}>
                                                                                            </lightning-button-icon>
                                                                                            <lightning-button-icon
                                                                                                icon-name="utility:close"
                                                                                                variant="bare"
                                                                                                size="x-small"
                                                                                                alternative-text="Cancelar"
                                                                                                title="Cancelar"
                                                                                                onclick={handleCancelSaDetails}>
                                                                                            </lightning-button-icon>
                                                                                        </div>
                                                                                    </template>
                                                                                </td>
                                                                            </tr>
                                                                            <template if:true={sa.revExpanded}>
                                                                                <tr class="rev-accordion-row">
                                                                                    <td colspan="9">
                                                                                        <div class="rev-accordion-content">
                                                                        <div class="rev-accordion-header">
                                                                        <lightning-icon icon-name="standard:entity" size="x-small" class="slds-m-right_x-small"></lightning-icon>
                                                                        <!-- En realidad son Revisiones de Cita de Servicio (Service Appointments), pero se muestra como Revisiones de ODT a peticin del cliente -->
                                                                        Revisiones de ODT
                                                                        <button class="add-rev-btn" data-sa-id={sa.id} onclick={handleCreateRevision} disabled={isCreatingRev} title="Agregar revisión">+ Nueva Revisión</button>
                                                                        <button class="hist-btn" data-sa-id={sa.id} onclick={handleToggleSaHistory} title="Ver historial de estado">Historial SA</button>
                                                                    </div>
                                                                                            <!-- SA history timeline -->
                                                                                            <template if:true={sa.saHistExpanded}>
                                                                                                <div class="hist-timeline">
                                                                                                    <template if:true={sa.saHistLoading}>
                                                                                                        <lightning-spinner size="x-small" alternative-text="Cargando..."></lightning-spinner>
                                                                                                    </template>
                                                                                                    <template if:false={sa.saHistLoading}>
                                                                                                        <template if:true={sa.hasSaHistory}>
                                                                                                            <template for:each={sa.saHistory} for:item="h">
                                                                                                                <div key={h.fecha} class="hist-row">
                                                                                                                    <span class="hist-fecha">{h.fecha}</span>
                                                                                                                    <span class="hist-user">{h.usuario}</span>
                                                                                                                    <span class="hist-old">{h.anterior}</span>
                                                                                                                    <span class="hist-arrow">→</span>
                                                                                                                    <span class="hist-new">{h.nuevo}</span>
                                                                                                                </div>
                                                                                                            </template>
                                                                                                        </template>
                                                                                                        <template if:false={sa.hasSaHistory}>
                                                                                                            <span class="hist-empty">Sin historial de estado.</span>
                                                                                                        </template>
                                                                                                    </template>
                                                                                                </div>
                                                                                            </template>
                                                                                            <table class="rev-table">
                                                                                                <thead>
                                                                                                    <tr>
                                                                                                        <th class="col-rev-folio">Folio</th>
                                                                                                        <th class="col-rev-tipo">Tipo</th>
                                                                                                        <th class="col-rev-estado">Estado</th>
                                                                                                        <th class="col-rev-formulario">Formulario</th>
                                                                                                        <th class="col-rev-badge">Fotos</th>
                                                                                                        <th class="col-rev-badge">NC</th>
                                                                                                        <th class="col-rev-actions"></th>
                                                                                                    </tr>
                                                                                                </thead>
                                                                                                <template for:each={sa.revisiones} for:item="rev">
                                                                                                    <tbody key={rev.id}>
                                                                                                        <tr class="rev-row">
                                                                                                            <!-- Folio -->
                                                                                                            <td class="rev-num"><span class="rev-folio-chip">{rev.folio}</span></td>

                                                                                                            <!-- Tipo (editable) -->
                                                                                                            <td class="col-rev-tipo">
                                                                                                                <template if:true={rev.isEditing}>
                                                                                                                    <lightning-combobox
                                                                                                                        label="Tipo"
                                                                                                                        variant="label-hidden"
                                                                                                                        value={rev.editTipo}
                                                                                                                        options={revTipoOptions}
                                                                                                                        class="rev-inline-combobox"
                                                                                                                        data-rev-id={rev.id}
                                                                                                                        data-field="tipo"
                                                                                                                        onchange={handleRevFieldChange}>
                                                                                                                    </lightning-combobox>
                                                                                                                </template>
                                                                                                                <template if:false={rev.isEditing}>
                                                                                                                    {rev.tipo}
                                                                                                                </template>
                                                                                                            </td>

                                                                                                            <!-- Estado (editable) -->
                                                                                                            <td class="col-rev-estado">
                                                                                                                <template if:true={rev.isEditing}>
                                                                                                                    <lightning-combobox
                                                                                                                        label="Estado"
                                                                                                                        variant="label-hidden"
                                                                                                                        value={rev.editStatus}
                                                                                                                        options={revStatusOptions}
                                                                                                                        class="rev-inline-combobox"
                                                                                                                        data-rev-id={rev.id}
                                                                                                                        data-field="status"
                                                                                                                        onchange={handleRevFieldChange}>
                                                                                                                    </lightning-combobox>
                                                                                                                </template>
                                                                                                                <template if:false={rev.isEditing}>
                                                                                                                    <span class={rev.statusClass}>{rev.status}</span>
                                                                                                                </template>
                                                                                                            </td>

                                                                                                            <!-- Formulario (editable) -->
                                                                                                            <td class="col-rev-formulario">
                                                                                                                <template if:true={rev.isEditing}>
                                                                                                                    <lightning-combobox
                                                                                                                        label="Formulario"
                                                                                                                        variant="label-hidden"
                                                                                                                        value={rev.editFormularioId}
                                                                                                                        options={formularioOptions}
                                                                                                                        class="rev-inline-combobox"
                                                                                                                        data-rev-id={rev.id}
                                                                                                                        data-field="formularioId"
                                                                                                                        onchange={handleRevFieldChange}>
                                                                                                                    </lightning-combobox>
                                                                                                                </template>
                                                                                                                <template if:false={rev.isEditing}>
                                                                                                                    {rev.formularioLabel}
                                                                                                                </template>
                                                                                                            </td>

                                                                                                            <!-- Fotos -->
                                                                                                            <td class="col-rev-badge">
                                                                                                                <div class="fotos-cell-wrap">
                                                                                                                    <template if:true={rev.fotos}>
                                                                                                                        <span class="rev-badge-fotos clickable-fotos" onclick={handlePreviewFotos} data-rev-id={rev.id} title="Ver fotos">📷 {rev.fotos}</span>
                                                                                                                    </template>
                                                                                                                    <template if:false={rev.fotos}>
                                                                                                                        <span class="rev-badge-zero" title="Sin fotos">—</span>
                                                                                                                    </template>
                                                                                                                    <lightning-button-icon
                                                                                                                        icon-name="utility:upload"
                                                                                                                        variant="bare"
                                                                                                                        size="x-small"
                                                                                                                        alternative-text="Subir Foto"
                                                                                                                        title="Subir Foto Manual"
                                                                                                                        data-rev-id={rev.id}
                                                                                                                        onclick={handleOpenUploadModal}
                                                                                                                        class="upload-foto-btn slds-m-left_xx-small">
                                                                                                                    </lightning-button-icon>
                                                                                                                </div>
                                                                                                            </td>

                                                                                                            <!-- NC -->
                                                                                                            <td class="col-rev-badge">
                                                                                                                <template if:true={rev.nc}>
                                                                                                                    <span class="rev-badge-nc">⚠ {rev.nc}</span>
                                                                                                                </template>
                                                                                                                <template if:false={rev.nc}>
                                                                                                                    <span class="rev-badge-zero">—</span>
                                                                                                                </template>
                                                                                                            </td>

                                                                                                            <!-- Acciones -->
                                                                                                            <td class="col-rev-actions">
                                                                                                                <template if:true={rev.isEditing}>
                                                                                                                    <div class="rev-actions-wrap">
                                                                                                                        <button class="rev-action-btn rev-save-btn" data-rev-id={rev.id} onclick={handleSaveRev} disabled={isSavingRev} title="Guardar">✓</button>
                                                                                                                        <button class="rev-action-btn rev-cancel-edit-btn" onclick={handleCancelEditRev} title="Cancelar edición">✕</button>
                                                                                                                    </div>
                                                                                                                </template>
                                                                                                                <template if:false={rev.isEditing}>
                                                                                                                    <div class="rev-actions-wrap">
                                                                                                                        <template if:true={rev.canPause}>
                                                                                                                            <button class="rev-action-btn rev-pause-btn" data-rev-id={rev.id} onclick={handlePauseRevision} disabled={isSavingRevAction} title="Pausar">⏸</button>
                                                                                                                        </template>
                                                                                                                        <template if:true={rev.canCancel}>
                                                                                                                            <button class="rev-action-btn rev-cancel-btn" data-rev-id={rev.id} onclick={handleCancelRevision} disabled={isSavingRevAction} title="Cancelar">✕</button>
                                                                                                                        </template>
                                                                                                                        <button class="rev-action-btn rev-hist-btn" data-rev-id={rev.id} onclick={handleToggleRevHistory} title="Ver historial">⏱</button>
                                                                                                                        <button class="rev-action-btn rev-edit-btn" data-rev-id={rev.id} onclick={handleEditRev} title="Editar revisión">✎</button>
                                                                                                                    </div>
                                                                                                                </template>
                                                                                                            </td>
                                                                                                        </tr>

                                                                                                        <!-- Fila historial: span completo -->
                                                                                                        <template if:true={rev.revHistExpanded}>
                                                                                                            <tr class="rev-hist-row">
                                                                                                                <td colspan="7" class="rev-hist-cell">
                                                                                                                    <template if:true={rev.revHistLoading}>
                                                                                                                        <lightning-spinner size="x-small" alternative-text="Cargando..."></lightning-spinner>
                                                                                                                    </template>
                                                                                                                    <template if:false={rev.revHistLoading}>
                                                                                                                        <div class="hist-timeline hist-timeline-rev">
                                                                                                                            <template if:true={rev.hasRevHistory}>
                                                                                                                                <template for:each={rev.revHistory} for:item="h">
                                                                                                                                    <div key={h.fecha} class="hist-row">
                                                                                                                                        <span class="hist-fecha">{h.fecha}</span>
                                                                                                                                        <span class="hist-user">{h.usuario}</span>
                                                                                                                                        <span class="hist-old">{h.anterior}</span>
                                                                                                                                        <span class="hist-arrow">→</span>
                                                                                                                                        <span class="hist-new">{h.nuevo}</span>
                                                                                                                                    </div>
                                                                                                                                </template>
                                                                                                                            </template>
                                                                                                                            <template if:false={rev.hasRevHistory}>
                                                                                                                                <span class="hist-empty">Sin historial.</span>
                                                                                                                            </template>
                                                                                                                        </div>
                                                                                                                    </template>
                                                                                                                </td>
                                                                                                            </tr>
                                                                                                        </template>
                                                                                                    </tbody>
                                                                                                </template>
                                                                                            </table>
                                                                                        </div>
                                                                                    </td>
                                                                                </tr>
                                                                            </template>
                                                                        </tbody>
                                                                    </template>
                                                                </table>
                                                            </div>
                                                        </td>
                                                    </tr>
                                                </template>

                                        </tbody>
                                    </template>
                                </table>
                            </template>

                            <template if:false={group.hasFilteredWorkOrders}>
                                <div class="empty-group">
                                    <lightning-icon icon-name="utility:info" size="x-small" class="slds-m-right_x-small"></lightning-icon>
                                    Sin órdenes que coincidan con los filtros.
                                </div>
                            </template>
                        </div>
                    </template>
                </div>
            </template>

            <template if:true={isEmpty}>
                <div class="empty-state">
                    <lightning-icon icon-name="standard:work_order" size="large" class="slds-m-bottom_small"></lightning-icon>
                    <p>No hay órdenes de trabajo para este cliente.</p>
                </div>
            </template>
        </template>

        <!-- MODAL: CONFIGURADOR DE CONTRATO -->
        <template if:true={showContractModal}>
            <section role="dialog" tabindex="-1" aria-modal="true" class="slds-modal slds-fade-in-open slds-modal_large">
                <div class="slds-modal__container">
                    <header class="slds-modal__header slds-grid slds-grid_vertical-align-center slds-grid_align-spread">
                        <div class="slds-grid slds-grid_vertical-align-center">
