<template>
    <lightning-card icon-name="standard:service_appointment">
        <div slot="title" class="card-title-slot">
            <span class="slds-text-heading_small">Citas de Servicio</span>
        </div>
        <div slot="actions">
            <!-- Badge verificado -->
            <template if:true={isVerificado}>
                <span class="verificado-badge" title={fechaVerif}>
                    <lightning-icon icon-name="utility:check" size="xx-small" variant="inverse" class="badge-icon"></lightning-icon>
                    Verificado
                    <template if:true={nombreFirmante}>
                        &nbsp;·&nbsp;{nombreFirmante}
                        <template if:true={cargoFirmante}>&nbsp;({cargoFirmante})</template>
                    </template>
                </span>
            </template>

            <!-- Botón Verificar (solo cuando NO está verificado) -->
            <template if:false={isVerificado}>
                <lightning-button
                    label="Verificar"
                    icon-name="utility:check"
                    variant="success"
                    disabled={isVerifying}
                    onclick={handleVerificar}>
                </lightning-button>
            </template>
            &nbsp;
            <!-- Botón Desverificar (solo cuando está verificado) -->
            <template if:true={isVerificado}>
                <lightning-button
                    label="Desverificar"
                    icon-name="utility:close"
                    variant="destructive-text"
                    disabled={isVerifying}
                    onclick={handleDesverificar}>
                </lightning-button>
            </template>
            &nbsp;
            <lightning-button
                label="PDF"
                icon-name="utility:pdf"
                variant="brand"
                disabled={isLoading}
                onclick={handleUnifiedPDF}>
            </lightning-button>
        </div>

        <!-- Modal Verificar ODT -->
        <template if:true={showVerifyModal}>
            <section role="dialog" tabindex="-1" aria-modal="true" class="slds-modal slds-fade-in-open">
                <div class="slds-modal__container">
                    <header class="slds-modal__header">
                        <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse"
                            onclick={handleCancelVerificar}>
                            <lightning-icon icon-name="utility:close" size="small"></lightning-icon>
                        </button>
                        <h2 class="slds-modal__title">
                            <lightning-icon icon-name="utility:check" size="small" variant="inverse" class="slds-m-right_x-small"></lightning-icon>
                            Verificar Orden de Trabajo
                        </h2>
                    </header>
                    <div class="slds-modal__content slds-p-around_medium">
                        <div class="slds-form-element slds-m-bottom_small">
                            <label class="slds-form-element__label">Nombre completo del Firmante</label>
                            <div class="slds-form-element__control">
                                <input type="text" class="slds-input"
                                    placeholder="Nombre completo de quien recibe"
                                    value={modalFirmante}
                                    onchange={handleVerifyModalFirmanteChange} />
                            </div>
                        </div>
                        <div class="slds-form-element">
                            <label class="slds-form-element__label">Cargo del Firmante</label>
                            <div class="slds-form-element__control">
                                <input type="text" class="slds-input"
                                    placeholder="Puesto o cargo"
                                    value={modalCargo}
                                    onchange={handleVerifyModalCargoChange} />
                            </div>
                        </div>
                    </div>
                    <footer class="slds-modal__footer">
                        <lightning-button label="Cancelar" onclick={handleCancelVerificar} class="slds-m-right_small"></lightning-button>
                        <lightning-button
                            label="Verificar"
                            variant="success"
                            icon-name="utility:check"
                            disabled={isVerifying}
                            onclick={handleConfirmVerificar}>
                        </lightning-button>
                    </footer>
                </div>
            </section>
            <div class="slds-backdrop slds-backdrop_open"></div>
        </template>

        <!-- Modal Historial SA -->
        <template if:true={showHistoryModal}>
            <section role="dialog" tabindex="-1" aria-modal="true" class="slds-modal slds-fade-in-open">
                <div class="slds-modal__container">
                    <header class="slds-modal__header">
                        <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse"
                            onclick={handleCloseHistory}>
                            <lightning-icon icon-name="utility:close" size="small"></lightning-icon>
                        </button>
                        <h2 class="slds-modal__title">
                            <lightning-icon icon-name="utility:clock" size="small" variant="inverse" class="slds-m-right_x-small"></lightning-icon>
                            {historyTitle}
                        </h2>
                    </header>
                    <div class="slds-modal__content slds-p-around_medium history-modal-body">
                        <template if:true={loadingHistory}>
                            <div class="slds-align_absolute-center slds-p-around_large">
                                <lightning-spinner size="small" alternative-text="Cargando historial..."></lightning-spinner>
                            </div>
                        </template>
                        <template if:false={loadingHistory}>
                            <template if:true={hasHistoryData}>
                                <table class="slds-table slds-table_cell-buffer slds-table_bordered slds-table_col-bordered">
                                    <thead>
                                        <tr class="slds-line-height_reset">
                                            <th scope="col"><div class="slds-truncate">Fecha</div></th>
                                            <th scope="col"><div class="slds-truncate">Usuario</div></th>
                                            <th scope="col"><div class="slds-truncate">Anterior</div></th>
                                            <th scope="col"><div class="slds-truncate">Nuevo</div></th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <template for:each={historyData} for:item="h">
                                            <tr key={h.fecha}>
                                                <td><div class="slds-truncate history-cell-fecha">{h.fecha}</div></td>
                                                <td><div class="slds-truncate">{h.usuario}</div></td>
                                                <td><div class="history-badge history-badge--old">{h.anterior}</div></td>
                                                <td><div class="history-badge history-badge--new">{h.nuevo}</div></td>
                                            </tr>
                                        </template>
                                    </tbody>
                                </table>
                            </template>
                            <template if:false={hasHistoryData}>
                                <div class="slds-align_absolute-center slds-p-around_large">
                                    <p class="slds-text-color_weak slds-text-body_small">Sin historial de estados disponible.</p>
                                </div>
                            </template>
                        </template>
                    </div>
                    <footer class="slds-modal__footer">
                        <lightning-button label="Cerrar" onclick={handleCloseHistory}></lightning-button>
                    </footer>
                </div>
            </section>
            <div class="slds-backdrop slds-backdrop_open"></div>
        </template>

        <!-- Modal PDF -->
        <template if:true={showModal}>
            <section role="dialog" tabindex="-1" class="slds-modal slds-fade-in-open slds-modal_large">
                <div class="slds-modal__container">
                    <header class="slds-modal__header">
                        <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse"
                            onclick={handleCloseModal}>
                            <lightning-icon icon-name="utility:close" size="small"></lightning-icon>
                        </button>
                        <h2 class="slds-modal__title">{modalTitle}</h2>
                    </header>
                    <div class="slds-modal__content modal-body">
                        <iframe src={modalUrl} class="pdf-iframe" title="PDF"></iframe>
                    </div>
                </div>
            </section>
            <div class="slds-backdrop slds-backdrop_open"></div>
        </template>

        <div class="slds-p-horizontal_medium slds-p-bottom_medium">

            <!-- Loading -->
            <template if:true={isLoading}>
                <div class="slds-align_absolute-center slds-p-around_large">
                    <lightning-spinner alternative-text="Cargando citas..." size="small"></lightning-spinner>
                </div>
            </template>

            <!-- Error -->
            <template if:true={hasError}>
                <div class="error-box slds-m-top_small">
                    <lightning-icon icon-name="utility:error" size="x-small" variant="error"></lightning-icon>
                    <span class="slds-m-left_x-small">{errorMessage}</span>
                </div>
            </template>

            <!-- Empty -->
            <template if:true={isEmpty}>
                <div class="slds-align_absolute-center slds-p-around_large">
                    <p class="slds-text-color_weak slds-text-body_small">Sin citas de servicio registradas.</p>
                </div>
            </template>

            <!-- Cards -->
            <template if:true={hasCitas}>
                <div class="citas-grid">
                    <template for:each={citas} for:item="cita">
                        <div key={cita.id} class="cita-card">

                            <!-- Header -->
                            <div class="card-header">
                                <div class="card-header-left">
                                    <a class="cita-number-link"
                                       data-sa-id={cita.id}
                                       onclick={handleOpenSA}
                                       href="javascript:void(0)">
                                        {cita.appointmentNumber}
                                    </a>
                                    <span class="cita-zonas">{cita.zonasTratar}</span>
                                </div>
                                <div class="card-header-right">
                                    <span class={cita.statusClass}>{cita.status}</span>
                                    <button class="btn-history-sa"
                                        data-sa-id={cita.id}
                                        data-sa-num={cita.appointmentNumber}
                                        onclick={handleShowHistory}
                                        title="Ver historial de estados">
                                        <lightning-icon icon-name="utility:clock" size="x-small" variant="inverse"></lightning-icon>
                                    </button>
                                    <button class="btn-pdf-sa"
                                        data-sa-id={cita.id}
                                        data-sa-num={cita.appointmentNumber}
                                        onclick={handleSaPDF}
                                        title="Ver PDF de esta Cita de Servicio">
                                        PDF
                                    </button>
                                </div>
                            </div>

                            <!-- Revisiones summary -->
                            <div class="revisiones-summary">
                                <span class="rev-label-head">Revisiones</span>
                                <span class="rev-fraction">
                                    <strong class="rev-completed">{cita.revisionesCompletadas}</strong>
                                    <span class="rev-sep"> / </span>
                                    <span class="rev-total">{cita.totalRevisiones}</span>
                                    <span class="rev-suffix"> completadas</span>
                                </span>
                            </div>

                            <!-- Progress bar -->
                            <div class="progress-bar-bg">
                                <div class="progress-bar-fill" style={cita.progressStyle}></div>
                            </div>

                            <!-- Revisiones list -->
                            <template if:true={cita.hasRevisiones}>
                                <div class="revisiones-list">
                                    <template for:each={cita.revisiones} for:item="rev">
                                        <div key={rev.id} class="revision-row">
                                            <span class="rev-name">{rev.name}</span>
                                            <!-- Formato -->
                                            <span class="rev-formato">{rev.tipoReporte}</span>
                                            <!-- Status -->
                                            <span class={rev.statusClass}>{rev.status}</span>
                                            <!-- Fotos -->
                                            <template if:true={rev.hasFotos}>
                                                <span class="rev-badge rev-badge-fotos" title="Fotos de evidencia">
                                                    📷 {rev.totalFotos}
                                                </span>
                                            </template>
                                            <!-- No conformidades -->
                                            <template if:true={rev.hasNC}>
                                                <span class="rev-badge rev-badge-nc" title="No conformidades">
                                                    ⚠️ {rev.totalNoConformidades} NC
                                                </span>
                                            </template>
                                        </div>
                                    </template>
                                </div>
                            </template>

                            <!-- No revisiones -->
                            <template if:false={cita.hasRevisiones}>
                                <div class="no-revisiones">Sin revisiones registradas.</div>
                            </template>

                        </div>
                    </template>
                </div>
            </template>

        </div>
    </lightning-card>
</template>
